<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>msg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ─── RESET & BASE ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0b;
    --bg1:       #111113;
    --bg2:       #19191d;
    --bg3:       #222228;
    --line:      #2a2a32;
    --line2:     #3a3a44;
    --muted:     #4a4a58;
    --soft:      #6e6e80;
    --body:      #b0b0c0;
    --heading:   #e8e8f0;
    --white:     #f2f2fa;
    --accent:    #7c6af5;
    --accent2:   #a855f7;
    --green:     #22d3a5;
    --red:       #f25a5a;
    --yellow:    #f2c94c;
    --radius:    4px;
    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Syne', sans-serif;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--body);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── SCROLLBAR ─────────────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ─── LAYOUT ─────────────────────────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
  }

  /* ─── SIDEBAR ─────────────────────────────────────────────────────────────── */
  #sidebar {
    background: var(--bg1);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    font-family: var(--font-sans);
    font-weight: 800;
    font-size: 18px;
    color: var(--white);
    letter-spacing: -0.02em;
  }

  .logo span {
    color: var(--accent);
  }

  #user-area {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }

  #user-area:hover { background: var(--bg2); }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .avatar-status {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 2px solid var(--bg1);
    background: var(--muted);
  }

  .avatar-status.online { background: var(--green); }

  .user-info { flex: 1; min-width: 0; }
  .user-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--heading);
    truncate: ellipsis;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .user-handle {
    font-size: 10px;
    color: var(--soft);
  }

  /* ─── SIDEBAR SECTIONS ───────────────────────────────────────────────────── */
  #rooms-container {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 16px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-label button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
  }

  .section-label button:hover { color: var(--body); }

  .room-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.1s, border-color 0.1s;
    position: relative;
  }

  .room-item:hover { background: var(--bg2); }

  .room-item.active {
    background: var(--bg2);
    border-left-color: var(--accent);
  }

  .room-icon {
    font-size: 11px;
    color: var(--soft);
    width: 14px;
    text-align: center;
    flex-shrink: 0;
  }

  .room-name {
    font-size: 12px;
    color: var(--body);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .room-item.active .room-name { color: var(--white); font-weight: 500; }

  .unread-badge {
    background: var(--accent);
    color: white;
    font-size: 9px;
    font-weight: 700;
    border-radius: 10px;
    padding: 1px 5px;
    min-width: 16px;
    text-align: center;
  }

  #sidebar-footer {
    padding: 10px 12px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 4px;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--soft);
    cursor: pointer;
    padding: 6px 8px;
    border-radius: var(--radius);
    font-size: 14px;
    transition: color 0.15s, background 0.15s;
  }

  .icon-btn:hover { color: var(--body); background: var(--bg2); }

  /* ─── MAIN CONTENT ──────────────────────────────────────────────────────── */
  #main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* ─── CHANNEL HEADER ────────────────────────────────────────────────────── */
  #chat-header {
    border-bottom: 1px solid var(--line);
    padding: 0 20px;
    height: 49px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    background: var(--bg);
  }

  #chat-header-name {
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 15px;
    color: var(--white);
    letter-spacing: -0.01em;
  }

  #chat-header-desc {
    font-size: 11px;
    color: var(--soft);
    flex: 1;
  }

  #online-count {
    font-size: 11px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  #online-count::before {
    content: '';
    display: block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  /* ─── MESSAGES ──────────────────────────────────────────────────────────── */
  #messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .message-group {
    display: flex;
    gap: 12px;
    padding: 4px 0;
    position: relative;
  }

  .message-group:hover .msg-actions {
    opacity: 1;
  }

  .msg-avatar {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .msg-avatar-placeholder { width: 30px; flex-shrink: 0; }

  .msg-body { flex: 1; min-width: 0; }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 2px;
  }

  .msg-author {
    font-size: 12px;
    font-weight: 600;
    color: var(--white);
    cursor: pointer;
  }

  .msg-author:hover { color: var(--accent); }

  .msg-time {
    font-size: 10px;
    color: var(--muted);
  }

  .msg-content {
    color: var(--body);
    font-size: 13px;
    line-height: 1.55;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg-content.deleted {
    color: var(--muted);
    font-style: italic;
  }

  .msg-edited {
    font-size: 10px;
    color: var(--muted);
    margin-left: 4px;
  }

  .msg-reply {
    background: var(--bg2);
    border-left: 2px solid var(--accent);
    padding: 4px 8px;
    margin-bottom: 4px;
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 11px;
    color: var(--soft);
    cursor: pointer;
  }

  .msg-reply:hover { color: var(--body); }

  .msg-reply-author { color: var(--accent); font-weight: 600; }

  .msg-reactions {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .reaction-pill {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 2px 7px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--body);
  }

  .reaction-pill:hover, .reaction-pill.mine {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 15%, transparent);
  }

  .reaction-count { font-size: 10px; }

  .msg-actions {
    position: absolute;
    right: 0;
    top: 0;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    display: flex;
    gap: 2px;
    padding: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .msg-action-btn {
    background: none;
    border: none;
    color: var(--soft);
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 2px;
    font-size: 12px;
    transition: color 0.1s, background 0.1s;
  }

  .msg-action-btn:hover { color: var(--body); background: var(--bg3); }

  /* System messages */
  .system-msg {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    padding: 8px 0;
  }

  .date-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0 8px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.08em;
  }

  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* ─── TYPING INDICATOR ──────────────────────────────────────────────────── */
  #typing-bar {
    height: 24px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--soft);
    flex-shrink: 0;
  }

  .typing-dots span {
    display: inline-block;
    width: 4px;
    height: 4px;
    background: var(--soft);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-4px); }
  }

  /* ─── INPUT AREA ────────────────────────────────────────────────────────── */
  #input-area {
    padding: 0 20px 16px;
    flex-shrink: 0;
  }

  #reply-banner {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-bottom: none;
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--soft);
    display: none;
    align-items: center;
    gap: 8px;
  }

  #reply-banner.visible { display: flex; }

  #reply-banner-author { color: var(--accent); font-weight: 600; }

  #reply-banner-close {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    transition: color 0.15s;
  }

  #reply-banner-close:hover { color: var(--body); }

  #input-wrapper {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    display: flex;
    align-items: flex-end;
    gap: 0;
    transition: border-color 0.2s;
  }

  #input-wrapper:focus-within { border-color: var(--accent); }
  #input-wrapper.replying { border-radius: 0 0 var(--radius) var(--radius); }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--body);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 200px;
    overflow-y: auto;
    caret-color: var(--accent);
  }

  #msg-input::placeholder { color: var(--muted); }

  .input-action {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 8px 10px;
    font-size: 15px;
    transition: color 0.15s;
    align-self: flex-end;
  }

  .input-action:hover { color: var(--body); }

  #send-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 14px;
    align-self: flex-end;
    height: 38px;
    transition: background 0.15s;
  }

  #send-btn:hover { background: var(--accent2); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── EMOJI PICKER ──────────────────────────────────────────────────────── */
  .emoji-popup {
    position: absolute;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .emoji-popup button {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 3px;
    border-radius: 2px;
    transition: background 0.1s;
  }

  .emoji-popup button:hover { background: var(--bg3); }

  /* ─── MODALS ────────────────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .modal {
    background: var(--bg1);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 24px;
    width: 380px;
    max-width: 90vw;
    animation: slideUp 0.2s ease;
  }

  .modal-title {
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 16px;
    color: var(--white);
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--body);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }

  .form-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }

  .form-tab {
    background: none;
    border: none;
    color: var(--soft);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }

  .form-tab.active { color: var(--white); border-bottom-color: var(--accent); }

  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    width: 100%;
  }

  .btn:hover { background: var(--accent2); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-ghost {
    background: none;
    border: 1px solid var(--line);
    color: var(--body);
  }

  .btn-ghost:hover { background: var(--bg2); border-color: var(--line2); }

  .btn-danger { background: var(--red); }
  .btn-danger:hover { background: color-mix(in srgb, var(--red) 80%, white); }

  .error-msg {
    background: color-mix(in srgb, var(--red) 15%, transparent);
    border: 1px solid color-mix(in srgb, var(--red) 30%, transparent);
    color: var(--red);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-size: 12px;
    margin-bottom: 12px;
  }

  /* ─── EMPTY STATE ────────────────────────────────────────────────────────── */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  #empty-state .big-icon { font-size: 40px; opacity: 0.3; }

  #empty-state p {
    font-size: 13px;
    text-align: center;
    max-width: 260px;
    line-height: 1.6;
  }

  /* ─── LOAD MORE ─────────────────────────────────────────────────────────── */
  #load-more-btn {
    align-self: center;
    background: var(--bg2);
    border: 1px solid var(--line);
    color: var(--soft);
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: color 0.15s, border-color 0.15s;
  }

  #load-more-btn:hover { color: var(--body); border-color: var(--line2); }

  /* ─── TOAST ─────────────────────────────────────────────────────────────── */
  #toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 9999;
    pointer-events: none;
  }

  .toast {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--body);
    animation: slideUp 0.2s ease;
    max-width: 280px;
  }

  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }

  /* ─── LOADING ────────────────────────────────────────────────────────────── */
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── CONNECTIONS STATUS ─────────────────────────────────────────────────── */
  #ws-status {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  #ws-status.connected { background: var(--green); }
  #ws-status.connecting { background: var(--yellow); animation: pulse 1s infinite; }
  #ws-status.disconnected { background: var(--red); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ─── USER SEARCH RESULTS ───────────────────────────────────────────────── */
  .search-results {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg2);
    max-height: 180px;
    overflow-y: auto;
    margin-top: 4px;
  }

  .search-result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .search-result-item:hover { background: var(--bg3); }

  .result-name { font-size: 12px; color: var(--white); }
  .result-username { font-size: 10px; color: var(--soft); }

  /* ─── CODE BLOCKS ───────────────────────────────────────────────────────── */
  .msg-content code {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--green);
  }

  .msg-content pre {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px;
    margin: 6px 0;
    overflow-x: auto;
    font-size: 12px;
    color: var(--green);
    line-height: 1.5;
  }

  /* ─── EDIT INPUT ─────────────────────────────────────────────────────────── */
  .edit-input {
    background: var(--bg2);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    color: var(--body);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 10px;
    width: 100%;
    outline: none;
    resize: none;
  }

  .edit-actions {

</style>
</head>

<script>
// ════════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════════
const API = '/api';
let state = {
  user: null,
  accessToken: null,
  refreshToken: null,
  rooms: [],
  currentRoomId: null,
  messages: [],
  hasMore: false,
  cursor: null,
  loadingMessages: false,
  replyTo: null,
  typingUsers: {}, // roomId -> Set of { userId, username }
  ws: null,
  wsStatus: 'disconnected',
  editingMessageId: null,
};

// ════════════════════════════════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════════════════════════════════
function saveAuth() {
  if (state.accessToken) {
    sessionStorage.setItem('accessToken', state.accessToken);
    sessionStorage.setItem('refreshToken', state.refreshToken || '');
    sessionStorage.setItem('user', JSON.stringify(state.user));
  } else {
    sessionStorage.removeItem('accessToken');
    sessionStorage.removeItem('refreshToken');
    sessionStorage.removeItem('user');
  }
}

function loadAuth() {
  const at = sessionStorage.getItem('accessToken');
  const rt = sessionStorage.getItem('refreshToken');
  const u = sessionStorage.getItem('user');
  if (at && u) {
    state.accessToken = at;
    state.refreshToken = rt;
    state.user = JSON.parse(u);
    return true;
  }
  return false;
}

// ════════════════════════════════════════════════════════════════════════
// API HELPERS
// ════════════════════════════════════════════════════════════════════════
async function apiFetch(path, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (state.accessToken) headers['Authorization'] = `Bearer ${state.accessToken}`;

  let res = await fetch(API + path, { ...options, headers });

  // Try refresh on 401
  if (res.status === 401 && state.refreshToken) {
    const refreshRes = await fetch(API + '/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken: state.refreshToken }),
    });
    if (refreshRes.ok) {
      const data = await refreshRes.json();
      state.accessToken = data.accessToken;
      state.refreshToken = data.refreshToken;
      saveAuth();
      headers['Authorization'] = `Bearer ${state.accessToken}`;
      res = await fetch(API + path, { ...options, headers });
    } else {
      logout();
      return null;
    }
  }

  return res;
}

async function apiGet(path) {
  const res = await apiFetch(path);
  if (!res) return null;
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function apiPost(path, body) {
  const res = await apiFetch(path, { method: 'POST', body: JSON.stringify(body) });
  if (!res) return null;
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function apiPatch(path, body) {
  const res = await apiFetch(path, { method: 'PATCH', body: JSON.stringify(body) });
  if (!res) return null;
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function apiDelete(path) {
  const res = await apiFetch(path, { method: 'DELETE' });
  if (!res) return null;
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ════════════════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════════════════
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ════════════════════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════════════════════
async function login(username, password) {
  const data = await apiPost('/auth/login', { username, password });
  if (data) {
    state.user = data.user;
    state.accessToken = data.accessToken;
    state.refreshToken = data.refreshToken;
    saveAuth();
    onAuthenticated();
  }
}

async function register(username, displayName, email, password) {
  const data = await apiPost('/auth/register', { username, displayName, email, password });
  if (data) {
    state.user = data.user;
    state.accessToken = data.accessToken;
    state.refreshToken = data.refreshToken;
    saveAuth();
    onAuthenticated();
  }
}

async function logout() {
  try {
    await apiPost('/auth/logout', { refreshToken: state.refreshToken });
  } catch {}
  if (state.ws) state.ws.close();
  state.user = null;
  state.accessToken = null;
  state.refreshToken = null;
  state.rooms = [];
  state.currentRoomId = null;
  saveAuth();
  showAuthModal();
}

// ════════════════════════════════════════════════════════════════════════
// WEBSOCKET
// ════════════════════════════════════════════════════════════════════════
let reconnectTimer = null;
let pingTimer = null;

function connectWS() {
  if (state.ws && state.ws.readyState < 2) return;
  updateWsStatus('connecting');

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws?token=${state.accessToken}`);
  state.ws = ws;

  ws.onopen = () => {
    updateWsStatus('connected');
    clearTimeout(reconnectTimer);
    // Keep-alive ping every 25s
    pingTimer = setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
    }, 25000);
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleWsMessage(msg);
    } catch {}
  };

  ws.onclose = () => {
    updateWsStatus('disconnected');
    clearInterval(pingTimer);
    if (state.accessToken) {
      reconnectTimer = setTimeout(connectWS, 3000);
    }
  };

  ws.onerror = () => {
    updateWsStatus('disconnected');
  };
}

function updateWsStatus(status) {
  state.wsStatus = status;
  const el = document.getElementById('ws-status');
  el.className = status;
  el.title = `WebSocket: ${status}`;
}

function handleWsMessage(msg) {
  switch (msg.type) {
    case 'message:new':
      if (msg.payload.roomId === state.currentRoomId) {
        addMessageToView(msg.payload, true);
        scrollToBottom();
      }
      incrementUnread(msg.payload.roomId);
      break;
    case 'message:edited':
      if (msg.payload.roomId === state.currentRoomId) {
        updateMessageInView(msg.payload);
      }
      break;
    case 'message:deleted':
      if (msg.payload.roomId === state.currentRoomId) {
        markMessageDeleted(msg.payload.messageId);
      }
      break;
    case 'message:reaction':
      if (msg.payload.messageId) {
        updateReactionsInView(msg.payload.messageId, msg.payload.reactions);
      }
      break;
    case 'typing:start':
      if (msg.payload.userId !== state.user?.id) {
        addTypingUser(msg.payload);
      }
      break;
    case 'typing:stop':
      removeTypingUser(msg.payload.userId, msg.payload.roomId);
      break;
    case 'presence':
      updatePresence(msg.payload.userId, msg.payload.isOnline);
      break;
  }
}

function wsSend(data) {
  if (state.ws?.readyState === WebSocket.OPEN) {
    state.ws.send(JSON.stringify(data));
  }
}

// ════════════════════════════════════════════════════════════════════════
// ROOMS
// ════════════════════════════════════════════════════════════════════════
async function loadRooms() {
  const data = await apiGet('/rooms');
  if (!data) return;
  state.rooms = data.rooms;
  renderSidebar();
}

function renderSidebar() {
  const dms = state.rooms.filter(r => r.type === 'direct');
  const rooms = state.rooms.filter(r => r.type !== 'direct');

  document.getElementById('dm-list').innerHTML = dms.map(r => renderRoomItem(r)).join('');
  document.getElementById('room-list').innerHTML = rooms.map(r => renderRoomItem(r)).join('');
}

function getRoomDisplayName(room) {
  if (room.type === 'direct') {
    const other = room.members?.find(m => m.user.id !== state.user?.id);
    return other ? other.user.displayName : 'Unknown';
  }
  return room.name || 'Unnamed Room';
}

function getRoomIcon(room) {
  if (room.type === 'direct') return '◎';
  if (room.type === 'channel') return '#';
  return '⊞';
}

function renderRoomItem(room) {
  const name = getRoomDisplayName(room);
  const icon = getRoomIcon(room);
  const active = room.id === state.currentRoomId ? 'active' : '';
  const badge = (room.unreadCount > 0)
    ? `<span class="unread-badge">${room.unreadCount}</span>`
    : '';
  return `<div class="room-item ${active}" data-room-id="${room.id}" onclick="selectRoom('${room.id}')">
    <span class="room-icon">${icon}</span>
    <span class="room-name">${esc(name)}</span>
    ${badge}
  </div>`;
}

function incrementUnread(roomId) {
  if (roomId === state.currentRoomId) return;
  const room = state.rooms.find(r => r.id === roomId);
  if (room) {
    room.unreadCount = (room.unreadCount || 0) + 1;
    renderSidebar();
  }
}

async function selectRoom(roomId) {
  state.currentRoomId = roomId;
  state.messages = [];
  state.hasMore = false;
  state.cursor = null;
  state.replyTo = null;

  const room = state.rooms.find(r => r.id === roomId);
  if (!room) return;

  // Update unread
  room.unreadCount = 0;
  renderSidebar();

  // Show chat view
  document.getElementById('empty-state').style.display = 'none';
  const chatView = document.getElementById('chat-view');
  chatView.style.display = 'flex';

  // Header
  document.getElementById('chat-header-icon').textContent = getRoomIcon(room);
  document.getElementById('chat-header-name').textContent = getRoomDisplayName(room);
  document.getElementById('chat-header-desc').textContent = room.description || '';

  document.getElementById('messages-container').innerHTML = '';
  document.getElementById('typing-text').textContent = '';

  await loadMessages();
  scrollToBottom(true);
  document.getElementById('msg-input').focus();
}

// ════════════════════════════════════════════════════════════════════════
// MESSAGES
// ════════════════════════════════════════════════════════════════════════
async function loadMessages(prepend = false) {
  if (state.loadingMessages || !state.currentRoomId) return;
  state.loadingMessages = true;

  try {
    const url = `/rooms/${state.currentRoomId}/messages?limit=50${state.cursor ? `&before=${encodeURIComponent(state.cursor.toString())}` : ''}`;
    const data = await apiGet(url);
    if (!data) return;

    if (prepend) {
      state.messages = [...data.messages, ...state.messages];
    } else {
      state.messages = data.messages;
    }
    state.hasMore = data.hasMore;
    state.cursor = data.cursor;

    if (prepend) {
      prependMessages(data.messages);
    } else {
      renderMessages(data.messages);
    }
  } finally {
    state.loadingMessages = false;
  }
}

const EMOJIS = ['👍','❤️','😂','😮','😢','🔥','✅','👀'];

function renderMessages(messages) {
  const container = document.getElementById('messages-container');
  container.innerHTML = '';

  if (state.hasMore) {
    const btn = document.createElement('button');
    btn.id = 'load-more-btn';
    btn.textContent = '↑ Load earlier messages';
    btn.onclick = () => loadMessages(true);
    container.appendChild(btn);
  }

  let lastDate = null;
  for (const msg of messages) {
    const msgDate = new Date(msg.createdAt).toDateString();
    if (msgDate !== lastDate) {
      container.appendChild(createDateDivider(msg.createdAt));
      lastDate = msgDate;
    }
    container.appendChild(createMessageEl(msg));
  }
}

function prependMessages(messages) {
  const container = document.getElementById('messages-container');
  const firstChild = container.firstChild;
  // Remove existing load-more btn
  const existing = container.querySelector('#load-more-btn');
  if (existing) existing.remove();

  if (state.hasMore) {
    const btn = document.createElement('button');
    btn.id = 'load-more-btn';
    btn.textContent = '↑ Load earlier messages';
    btn.onclick = () => loadMessages(true);
    container.insertBefore(btn, container.firstChild);
  }

  let lastDate = null;
  const fragment = document.createDocumentFragment();
  for (const msg of messages) {
    const msgDate = new Date(msg.createdAt).toDateString();
    if (msgDate !== lastDate) {
      fragment.appendChild(createDateDivider(msg.createdAt));
      lastDate = msgDate;
    }
    fragment.appendChild(createMessageEl(msg));
  }

  if (state.hasMore) {
    const btn = container.querySelector('#load-more-btn');
    btn.after(fragment);
  } else {
    container.insertBefore(fragment, container.firstChild);
  }
}

function createDateDivider(date) {
  const el = document.createElement('div');
  el.className = 'date-divider';
  el.textContent = new Date(date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  return el;
}

function formatMsgContent(content) {
  // Escape HTML first
  let s = esc(content);
  // Code blocks
  s = s.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  // Inline code
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // URLs
  s = s.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent)">$1</a>');
  return s;
}

function createMessageEl(msg) {
  const group = document.createElement('div');
  group.className = 'message-group';
  group.dataset.msgId = msg.id;

  if (msg.type === 'system') {
    group.innerHTML = `<div class="system-msg">${esc(msg.content)}</div>`;
    return group;
  }

  const isMe = msg.sender?.id === state.user?.id;
  const sender = msg.sender;
  const initials = (sender?.displayName || '?').slice(0, 2).toUpperCase();
  const time = formatTime(msg.createdAt);

  // Group avatars: show avatar only for first in group
  const avatarHtml = `
    <div class="msg-avatar">
      <div class="avatar" style="width:30px;height:30px;font-size:10px">
        ${sender?.avatarUrl ? `<img src="${esc(sender.avatarUrl)}" alt="">` : `<span>${initials}</span>`}
      </div>
    </div>`;

  // Reply
  const replyHtml = msg.replyTo ? `
    <div class="msg-reply" onclick="scrollToMessage('${msg.replyTo.id}')">
      <span class="msg-reply-author">${esc(msg.replyTo.sender?.displayName || '?')}</span>
      ${esc(msg.replyTo.content?.slice(0, 80) || '')}${msg.replyTo.content?.length > 80 ? '…' : ''}
    </div>` : '';

  // Reactions
  const reactions = groupReactions(msg.reactions || []);
  const reactHtml = reactions.length ? `
    <div class="msg-reactions">
      ${reactions.map(r => {
        const mine = r.users.some(u => u.id === state.user?.id);
        return `<button class="reaction-pill ${mine ? 'mine' : ''}" onclick="toggleReaction('${msg.id}', '${r.emoji}')">
          ${r.emoji} <span class="reaction-count">${r.count}</span>
        </button>`;
      }).join('')}
    </div>` : '';

  // Actions
  const editBtn = isMe && !msg.deletedAt ? `<button class="msg-action-btn" title="Edit" onclick="startEdit('${msg.id}')">✎</button>` : '';
  const deleteBtn = isMe && !msg.deletedAt ? `<button class="msg-action-btn" title="Delete" onclick="deleteMessage('${msg.id}')">✕</button>` : '';

  group.innerHTML = `
    ${avatarHtml}
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-author">${esc(sender?.displayName || 'Unknown')}</span>
        <span class="msg-time">${time}</span>
        ${msg.editedAt ? '<span class="msg-edited">(edited)</span>' : ''}
      </div>
      ${replyHtml}
      <div class="msg-content ${msg.deletedAt ? 'deleted' : ''}" id="msg-content-${msg.id}">
        ${msg.deletedAt ? '<em>This message was deleted</em>' : formatMsgContent(msg.content)}
      </div>
      ${reactHtml}
    </div>
    <div class="msg-actions">
      <button class="msg-action-btn" title="Reply" onclick="setReply('${msg.id}')">↩</button>
      <button class="msg-action-btn" title="React" onclick="showEmojiForMsg(event, '${msg.id}')">☺</button>
      ${editBtn}
      ${deleteBtn}
    </div>`;

  return group;
}

function addMessageToView(msg, isNew = false) {
  const container = document.getElementById('messages-container');
  const el = createMessageEl(msg);
  if (isNew) el.classList.add('new');
  container.appendChild(el);
  state.messages.push(msg);
}

function updateMessageInView(msg) {
  const contentEl = document.getElementById(`msg-content-${msg.id}`);
  if (contentEl) {
    contentEl.innerHTML = formatMsgContent(msg.content);
    // Update edited label
    const group = document.querySelector(`[data-msg-id="${msg.id}"]`);
    const meta = group?.querySelector('.msg-meta');
    if (meta && !meta.querySelector('.msg-edited')) {
      meta.insertAdjacentHTML('beforeend', '<span class="msg-edited">(edited)</span>');
    }
  }
}

function markMessageDeleted(messageId) {
  const contentEl = document.getElementById(`msg-content-${messageId}`);
  if (contentEl) {
    contentEl.className = 'msg-content deleted';
    contentEl.innerHTML = '<em>This message was deleted</em>';
    // Remove action buttons
    const group = document.querySelector(`[data-msg-id="${messageId}"]`);
    const actions = group?.querySelector('.msg-actions');
    if (actions) actions.innerHTML = '';
  }
}

function updateReactionsInView(messageId, reactions) {
  const group = document.querySelector(`[data-msg-id="${messageId}"]`);
  if (!group) return;
  const body = group.querySelector('.msg-body');
  if (!body) return;

  let reactContainer = body.querySelector('.msg-reactions');
  const grouped = groupReactions(reactions);

  if (grouped.length === 0) {
    reactContainer?.remove();
    return;
  }

  const html = `<div class="msg-reactions">
    ${grouped.map(r => {
      const mine = r.users.some(u => u.id === state.user?.id);
      return `<button class="reaction-pill ${mine ? 'mine' : ''}" onclick="toggleReaction('${messageId}', '${r.emoji}')">
        ${r.emoji} <span class="reaction-count">${r.count}</span>
      </button>`;
    }).join('')}
  </div>`;

  if (reactContainer) {
    reactContainer.outerHTML = html;
  } else {
    body.insertAdjacentHTML('beforeend', html);
  }
}

function groupReactions(reactions) {
  const map = new Map();
  for (const r of reactions) {
    if (!map.has(r.emoji)) map.set(r.emoji, { emoji: r.emoji, count: 0, users: [] });
    const entry = map.get(r.emoji);
    entry.count++;
    entry.users.push(r.user);
  }
  return [...map.values()];
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !state.currentRoomId) return;

  const body = { content };
  if (state.replyTo) body.replyToId = state.replyTo.id;

  input.value = '';
  autoResize(input);
  clearReply();

  try {
    await apiPost(`/rooms/${state.currentRoomId}/messages`, body);
    // Message will appear via WS
    scrollToBottom();
  } catch (err) {
    toast(err.message, 'error');
    input.value = content; // restore
  }
}

async function deleteMessage(messageId) {
  if (!confirm('Delete this message?')) return;
  try {
    await apiDelete(`/rooms/${state.currentRoomId}/messages/${messageId}`);
    // Will update via WS
  } catch (err) {
    toast(err.message, 'error');
  }
}

function startEdit(messageId) {
  const msg = state.messages.find(m => m.id === messageId);
  if (!msg) return;

  state.editingMessageId = messageId;
  const contentEl = document.getElementById(`msg-content-${messageId}`);
  const original = msg.content;

  contentEl.innerHTML = `
    <textarea class="edit-input" id="edit-textarea-${messageId}">${esc(original)}</textarea>
    <div class="edit-actions">
      <button class="save-edit" onclick="saveEdit('${messageId}')">Save</button>
      <span> · </span>
      <button class="cancel-edit" onclick="cancelEdit('${messageId}', \`${original.replace(/`/g, '\\`')}\`)">Cancel</button>
    </div>`;

  const textarea = document.getElementById(`edit-textarea-${messageId}`);
  textarea.focus();
  textarea.select();
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      saveEdit(messageId);
    }
    if (e.key === 'Escape') cancelEdit(messageId, original);
  });
}

async function saveEdit(messageId) {
  const textarea = document.getElementById(`edit-textarea-${messageId}`);
  const content = textarea?.value.trim();
  if (!content) return;

  try {
    await apiPatch(`/rooms/${state.currentRoomId}/messages/${messageId}`, { content });
    // Will update via WS
  } catch (err) {
    toast(err.message, 'error');
  }
}

function cancelEdit(messageId, original) {
  const contentEl = document.getElementById(`msg-content-${messageId}`);
  if (contentEl) contentEl.innerHTML = formatMsgContent(original);
  state.editingMessageId = null;
}

async function toggleReaction(messageId, emoji) {
  try {
    await apiPost(`/rooms/${state.currentRoomId}/messages/${messageId}/react`, { emoji });
    // Will update via WS
  } catch (err) {
    toast(err.message, 'error');
  }
}

function scrollToMessage(messageId) {
  const el = document.querySelector(`[data-msg-id="${messageId}"]`);
  el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el?.classList.add('new');
  setTimeout(() => el?.classList.remove('new'), 1000);
}

// ════════════════════════════════════════════════════════════════════════
// REPLY
// ════════════════════════════════════════════════════════════════════════
function setReply(messageId) {
  const msg = state.messages.find(m => m.id === messageId);
  if (!msg) return;
  state.replyTo = msg;

  const banner = document.getElementById('reply-banner');
  banner.classList.add('visible');
  document.getElementById('reply-banner-author').textContent = msg.sender?.displayName || '?';
  document.getElementById('reply-banner-preview').textContent = msg.content?.slice(0, 60) || '';
  document.getElementById('input-wrapper').classList.add('replying');
  document.getElementById('msg-input').focus();
}

function clearReply() {
  state.replyTo = null;
  document.getElementById('reply-banner').classList.remove('visible');
  document.getElementById('input-wrapper').classList.remove('replying');
}

// ════════════════════════════════════════════════════════════════════════
// TYPING
// ════════════════════════════════════════════════════════════════════════
let typingTimeout = null;
let isTyping = false;

function onInputChange() {
  if (!state.currentRoomId) return;
  if (!isTyping) {
    isTyping = true;
    wsSend({ type: 'typing:start', payload: { roomId: state.currentRoomId } });
  }
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    isTyping = false;
    wsSend({ type: 'typing:stop', payload: { roomId: state.currentRoomId } });
  }, 2500);
}

function addTypingUser({ userId, username, roomId }) {
  if (roomId !== state.currentRoomId) return;
  if (!state.typingUsers[roomId]) state.typingUsers[roomId] = new Map();
  state.typingUsers[roomId].set(userId, username);
  renderTyping(roomId);
}

function removeTypingUser(userId, roomId) {
  state.typingUsers[roomId]?.delete(userId);
  renderTyping(roomId);
}

function renderTyping(roomId) {
  if (roomId !== state.currentRoomId) return;
  const users = [...(state.typingUsers[roomId]?.values() || [])];
  const el = document.getElementById('typing-text');
  if (users.length === 0) {
    el.innerHTML = '';
  } else {
    const names = users.join(', ');
    el.innerHTML = `<span class="typing-dots"><span></span><span></span><span></span></span> ${esc(names)} ${users.length === 1 ? 'is' : 'are'} typing…`;
  }
}

// ════════════════════════════════════════════════════════════════════════
// PRESENCE
// ════════════════════════════════════════════════════════════════════════
function updatePresence(userId, isOnline) {
  // Update room member list if in a room with this user
  state.rooms.forEach(room => {
    const member = room.members?.find(m => m.user.id === userId);
    if (member) member.user.isOnline = isOnline;
  });
}

// ════════════════════════════════════════════════════════════════════════
// EMOJI POPUP
// ════════════════════════════════════════════════════════════════════════
let currentEmojiTarget = null;

function showEmojiForMsg(e, messageId) {
  e.stopPropagation();
  closeEmojiPopup();

  currentEmojiTarget = messageId;
  const popup = document.createElement('div');
  popup.className = 'emoji-popup';
  popup.id = 'emoji-popup';

  EMOJIS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.textContent = emoji;
    btn.onclick = () => {
      toggleReaction(messageId, emoji);
      closeEmojiPopup();
    };
    popup.appendChild(btn);
  });

  const rect = e.currentTarget.getBoundingClientRect();
  popup.style.position = 'fixed';
  popup.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
  popup.style.left = rect.left + 'px';

  document.body.appendChild(popup);
}

function closeEmojiPopup() {
  document.getElementById('emoji-popup')?.remove();
  currentEmojiTarget = null;
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('#emoji-popup') && !e.target.closest('.msg-action-btn')) {
    closeEmojiPopup();
  }
});

// ════════════════════════════════════════════════════════════════════════
// ROOM CREATION
// ════════════════════════════════════════════════════════════════════════
async function createRoom() {
  const name = document.getElementById('new-room-name').value.trim();
  const description = document.getElementById('new-room-desc').value.trim();
  if (!name) return;

  try {
    const data = await apiPost('/rooms', { name, description, type: 'group' });
    toast(`Room "${name}" created!`, 'success');
    document.getElementById('new-room-modal').style.display = 'none';
    await loadRooms();
    selectRoom(data.room.id);
  } catch (err) {
    toast(err.message, 'error');
  }
}

// ════════════════════════════════════════════════════════════════════════
// DM
// ════════════════════════════════════════════════════════════════════════
async function searchUsers(q) {
  if (q.length < 2) {
    document.getElementById('dm-search-results').style.display = 'none';
    return;
  }
  try {
    const data = await apiGet(`/rooms/users/search?q=${encodeURIComponent(q)}`);
    const container = document.getElementById('dm-search-results');
    if (!data.users.length) {
      container.style.display = 'none';
      return;
    }
    container.style.display = 'block';
    container.innerHTML = data.users.map(u => `
      <div class="search-result-item" onclick="startDM('${u.id}')">
        <div class="avatar" style="width:28px;height:28px;font-size:10px">
          ${u.avatarUrl ? `<img src="${esc(u.avatarUrl)}" alt="">` : `<span>${u.displayName.slice(0,2).toUpperCase()}</span>`}
          <div class="avatar-status ${u.isOnline ? 'online' : ''}"></div>
        </div>
        <div>
          <div class="result-name">${esc(u.displayName)}</div>
          <div class="result-username">@${esc(u.username)}</div>
        </div>
      </div>`).join('');
  } catch {}
}

async function startDM(userId) {
  document.getElementById('new-dm-modal').style.display = 'none';
  try {
    const data = await apiPost(`/rooms/dm/${userId}`, {});
    await loadRooms();
    selectRoom(data.room.id);
  } catch (err) {
    toast(err.message, 'error');
  }
}

// ════════════════════════════════════════════════════════════════════════
// UI UTILITIES
// ════════════════════════════════════════════════════════════════════════
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function autoResize(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
}

function scrollToBottom(instant = false) {
  const container = document.getElementById('messages-container');
  container.scrollTo({ top: container.scrollHeight, behavior: instant ? 'auto' : 'smooth' });
}

// ════════════════════════════════════════════════════════════════════════
// MODAL MANAGEMENT
// ════════════════════════════════════════════════════════════════════════
function showAuthModal() {
  document.getElementById('auth-modal').style.display = 'flex';
}

function hideAuthModal() {
  document.getElementById('auth-modal').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('auth-error').style.display = 'none';
}

// ════════════════════════════════════════════════════════════════════════
// AFTER LOGIN
// ════════════════════════════════════════════════════════════════════════
async function onAuthenticated() {
  hideAuthModal();
  updateUserUI();
  await loadRooms();
  connectWS();
}

function updateUserUI() {
  const u = state.user;
  if (!u) return;
  document.getElementById('my-display-name').textContent = u.displayName;
  document.getElementById('my-username').textContent = '@' + u.username;
  document.getElementById('my-avatar-initials').textContent = u.displayName.slice(0, 2).toUpperCase();
}

// ════════════════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ════════════════════════════════════════════════════════════════════════

// Auth tabs
document.querySelectorAll('.form-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.form-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const which = tab.dataset.tab;
    document.getElementById('login-form').style.display = which === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = which === 'register' ? 'block' : 'none';
    hideError();
  });
});

// Login
document.getElementById('login-btn').addEventListener('click', async () => {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { showError('Fill in all fields'); return; }
  hideError();
  try {
    await login(username, password);
  } catch (err) {
    showError(err.message);
  }
});

// Register
document.getElementById('register-btn').addEventListener('click', async () => {
  const username = document.getElementById('reg-username').value.trim();
  const displayName = document.getElementById('reg-displayname').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !displayName || !email || !password) { showError('Fill in all fields'); return; }
  hideError();
  try {
    await register(username, displayName, email, password);
  } catch (err) {
    showError(err.message);
  }
});

// Enter key in auth forms
['login-username', 'login-password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
});

['reg-username', 'reg-displayname', 'reg-email', 'reg-password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('register-btn').click();
  });
});

// Logout
document.getElementById('logout-btn').addEventListener('click', logout);

// Message input
const msgInput = document.getElementById('msg-input');
msgInput.addEventListener('input', () => {
  autoResize(msgInput);
  onInputChange();
});

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('send-btn').addEventListener('click', sendMessage);

// Reply banner close
document.getElementById('reply-banner-close').addEventListener('click', clearReply);

// New room
document.getElementById('new-room-btn').addEventListener('click', () => {
  document.getElementById('new-room-modal').style.display = 'flex';
  document.getElementById('new-room-name').value = '';
  document.getElementById('new-room-desc').value = '';
  setTimeout(() => document.getElementById('new-room-name').focus(), 50);
});

document.getElementById('cancel-new-room').addEventListener('click', () => {
  document.getElementById('new-room-modal').style.display = 'none';
});

document.getElementById('create-room-btn').addEventListener('click', createRoom);

document.getElementById('new-room-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') createRoom();
});

// New DM
document.getElementById('new-dm-btn').addEventListener('click', () => {
  document.getElementById('new-dm-modal').style.display = 'flex';
  document.getElementById('dm-search-input').value = '';
  document.getElementById('dm-search-results').style.display = 'none';
  setTimeout(() => document.getElementById('dm-search-input').focus(), 50);
});

document.getElementById('cancel-new-dm').addEventListener('click', () => {
  document.getElementById('new-dm-modal').style.display = 'none';
});

let dmSearchTimer = null;
document.getElementById('dm-search-input').addEventListener('input', (e) => {
  clearTimeout(dmSearchTimer);
  dmSearchTimer = setTimeout(() => searchUsers(e.target.value.trim()), 300);
});

// Modal backdrop click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay && overlay.id !== 'auth-modal') {
      overlay.style.display = 'none';
    }
  });
});

// Emoji button (for quick reaction picker in input bar)
document.getElementById('emoji-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  closeEmojiPopup();
  const popup = document.createElement('div');
  popup.className = 'emoji-popup';
  popup.id = 'emoji-popup';
  EMOJIS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.textContent = emoji;
    btn.onclick = () => {
      msgInput.value += emoji;
      msgInput.focus();
      closeEmojiPopup();
    };
    popup.appendChild(btn);
  });
  const rect = e.currentTarget.getBoundingClientRect();
  popup.style.position = 'fixed';
  popup.style.bottom = (window.innerHeight - rect.top + 8) + 'px';
  popup.style.left = rect.left + 'px';
  document.body.appendChild(popup);
});

// Scroll to load more
document.getElementById('messages-container').addEventListener('scroll', function() {
  if (this.scrollTop < 50 && state.hasMore && !state.loadingMessages) {
    const prevHeight = this.scrollHeight;
    loadMessages(true).then(() => {
      // Preserve scroll position after prepend
      this.scrollTop = this.scrollHeight - prevHeight;
    });
  }
});

// ════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════
async function init() {
  if (loadAuth()) {
    try {
      // Verify token is still valid
      const data = await apiGet('/auth/me');
      if (data) {
        state.user = data.user;
        saveAuth();
        onAuthenticated();
        return;
      }
    } catch {}
  }
  showAuthModal();
}

init();
</script>
