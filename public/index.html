<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>msg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  /* ─── RESET & BASE ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --canvas:    #f2f4f7;
    --bg:        #ffffff;
    --bg-rail:   #fcfcfd;
    --bg-hover:  #f9fafb;
    --bg-active: #f2f4f7;
    --line:      #eaecf0;
    --text-main: #101828;
    --text-muted:#475467;
    --text-soft: #667085;
    --accent:    #1570ef;
    --accent-bg: #eff8ff;
    --green:     #12b76a;
    --green-bg:  #ecfdf3;
    --green-txt: #027a48;
    --radius:    8px;
    --app-gap:   clamp(8px, 1.4vw, 18px);
    --font-sans: 'Inter', system-ui, sans-serif;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--canvas);
    color: var(--text-main);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: var(--app-gap);
  }

  /* ─── SCROLLBAR ─────────────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #98a2b3; }

  /* ─── LAYOUT ─────────────────────────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-columns: 260px 340px 1fr;
    grid-template-rows: 1fr;
    height: calc(100vh - (var(--app-gap) * 2));
    width: calc(100vw - (var(--app-gap) * 2));
    background: var(--bg);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(16, 24, 40, 0.06);
    box-shadow: 0 24px 48px -24px rgba(16, 24, 40, 0.28), 0 8px 16px -12px rgba(16, 24, 40, 0.18);
  }

  /* ─── RAIL (Sidebar 1) ─────────────────────────────────────────────────── */
  #nav-rail {
    background: var(--bg);
    border-right: 1px solid var(--line);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .rail-brand {
    display: flex;
    align-items: center;
    gap: 0;
    font-weight: 600;
    color: var(--green);
    font-size: 22px;
    padding: 0 8px;
    font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    letter-spacing: 0.4px;
  }

  .rail-nav {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .rail-item {
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s;
  }

  .rail-item:hover { background: var(--bg-hover); color: var(--text-main); }
  
  .rail-item.active {
    background: var(--bg-hover);
    color: var(--text-main);
  }

  .rail-icon {
    font-size: 18px;
    color: var(--text-soft);
  }
  .rail-item.active .rail-icon { color: var(--text-main); }

  .rail-badge {
    margin-left: auto;
    background: #f2f4f7;
    color: #344054;
    font-size: 12px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 16px;
  }

  .rail-foot { margin-top: auto; }

  /* ─── INBOX (Sidebar 2) ──────────────────────────────────────────────────── */
  #sidebar {
    background: var(--bg);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #inbox-search-wrap {
    padding: 24px 20px 16px;
  }

  .search-input-box {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-input-box::before {
    content: "🔍";
    position: absolute;
    left: 12px;
    font-size: 12px;
    color: var(--text-soft);
    filter: grayscale(100%) opacity(0.6);
  }

  #inbox-search {
    width: 100%;
    height: 44px;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    padding: 0 14px 0 36px;
    background: #ffffff;
    color: var(--text-main);
    font-family: var(--font-sans);
    font-size: 15px;
    outline: none;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #inbox-search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-bg);
  }

  #active-strip {
    padding: 0 20px 24px;
    border-bottom: 1px solid var(--line);
  }

  .section-label {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 12px;
  }

  .active-avatars {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .active-avatars::-webkit-scrollbar { display: none; }

  .active-dot {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--bg-active);
    position: relative;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
  }
  .active-dot img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }

  .status-indicator {
    position: absolute;
    right: 2px;
    bottom: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--green);
    border: 2px solid #ffffff;
  }

  #rooms-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
  }

  .messages-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px 12px;
  }

  .messages-header-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .messages-header-badge {
    background: #f2f4f7;
    color: #344054;
    font-size: 12px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 16px;
  }

  .compose-btn {
    background: transparent;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
    transition: all 0.15s;
  }
  .compose-btn:hover { background: var(--bg-hover); color: var(--text-main); }

  .room-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    margin-bottom: 2px;
  }
  .room-item:hover { background: var(--bg-hover); }
  .room-item.active { background: var(--bg-hover); }

  .room-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--bg-active);
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    color: var(--text-muted);
  }
  .room-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

  .room-content {
    flex: 1;
    min-width: 0;
  }

  .room-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }

  .room-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .room-time {
    font-size: 12px;
    color: var(--text-soft);
    flex-shrink: 0;
  }

  .room-preview {
    font-size: 14px;
    color: var(--text-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── MAIN CONTENT (Chat & Network) ────────────────────────────────────── */
  #main {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
  }

  #chat-header {
    border-bottom: 1px solid var(--line);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: #ffffff;
  }

  #chat-header-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--bg-active);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-muted);
    position: relative;
  }
  #chat-header-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

  .chat-header-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .chat-header-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #chat-header-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-main);
  }

  .online-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--green-bg);
    color: var(--green-txt);
    padding: 2px 8px;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid #abefc6;
  }
  .online-pill::before {
    content: '';
    display: block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  #chat-header-handle {
    font-size: 14px;
    color: var(--text-soft);
  }

  /* ─── MESSAGES ──────────────────────────────────────────────────────────── */
  #messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .date-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 16px 0;
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 500;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .message-group {
    display: flex;
    gap: 16px;
    width: 100%;
    position: relative;
  }
  
  .message-group.compact {
    margin-top: -16px;
  }
  .message-group.compact .msg-avatar { opacity: 0; }
  .message-group.compact .msg-meta { display: none; }

  /* Incoming Message */
  .msg-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--bg-active);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    color: var(--text-muted);
  }
  .msg-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

  .msg-body {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 70%;
  }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .msg-author {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
  }

  .msg-time {
    font-size: 12px;
    color: var(--text-soft);
  }

  .msg-content {
    font-size: 15px;
    color: var(--text-main);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Outgoing Message (Mine) */
  .message-group.mine {
    justify-content: flex-end;
  }
  .message-group.mine .msg-avatar {
    display: none;
  }
  .message-group.mine .msg-body {
    align-items: flex-end;
  }
  .message-group.mine .msg-meta {
    flex-direction: row-reverse;
  }
  .message-group.mine .msg-content {
    background: var(--accent);
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 12px 12px 0 12px;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
  }

  /* Attachments */
  .msg-attachments {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }
  
  .file-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
    text-decoration: none;
    max-width: 320px;
    transition: background 0.15s;
  }
  .file-card:hover { background: var(--bg-hover); }

  .file-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f2f4f7;
    border-radius: 6px;
    border: 1px solid var(--line);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .file-info {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .file-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .file-meta {
    font-size: 12px;
    color: var(--text-soft);
  }

  .msg-attachment-image {
    max-width: 280px;
    border-radius: 8px;
    border: 1px solid var(--line);
  }

  .msg-actions {
    position: absolute;
    right: 0;
    top: -16px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 6px;
    display: flex;
    padding: 2px;
    opacity: 0;
    box-shadow: 0 2px 4px rgba(16,24,40,0.05);
    transition: opacity 0.15s;
  }
  .message-group:hover .msg-actions { opacity: 1; }
  .message-group.mine .msg-actions { right: auto; left: 0; }

  .msg-action-btn {
    background: none;
    border: none;
    padding: 4px 8px;
    cursor: pointer;
    color: var(--text-soft);
    border-radius: 4px;
  }
  .msg-action-btn:hover { background: var(--bg-hover); color: var(--text-main); }

  /* ─── INPUT AREA ────────────────────────────────────────────────────────── */
  #input-area {
    padding: 0 32px 32px;
  }

  #input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px 16px;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    background: #ffffff;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-bg);
  }

  .input-action {
    background: none;
    border: none;
    color: var(--text-soft);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
  }
  .input-action:hover { color: var(--text-main); background: var(--bg-hover); }

  #msg-input {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--font-sans);
    font-size: 15px;
    color: var(--text-main);
    max-height: 150px;
    padding: 4px 0;
    background: transparent;
  }
  #msg-input::placeholder { color: #98a2b3; }

  #send-btn {
    background: var(--accent);
    color: #ffffff;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(16,24,40,0.05);
  }
  #send-btn:hover { background: #175cd3; }

  /* Utilities */
  .system-msg { text-align: center; color: var(--text-soft); font-size: 13px; margin: 16px 0; }
  #empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-soft); }
  
  /* ─── NETWORK GRAPH VIEW ────────────────────────────────────────────────── */
  #network-view {
    display: none;
    flex-direction: column;
    height: 100%;
    width: 100%;
    background: var(--bg);
  }
  #network-header {
    border-bottom: 1px solid var(--line);
    padding: 20px 24px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #network-header h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-main);
  }
  .network-seed-btn {
    border: 1px solid #d0d5dd;
    background: #fff;
    color: var(--text-main);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .network-seed-btn:hover { background: var(--bg-hover); }
  #graph-container {
    flex: 1;
    width: 100%;
    height: 100%;
    background: #fcfcfd;
  }

  /* Required Overlays/Modals (Simplified visually) */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(16,24,40,0.5); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal {
    background: #ffffff; border-radius: 12px; padding: 24px; width: 400px; max-width: 90vw;
    box-shadow: 0 20px 24px -4px rgba(16,24,40,0.08), 0 8px 8px -4px rgba(16,24,40,0.03);
  }
  .theme-modal {
    width: 460px;
  }
  .theme-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .theme-btn {
    border: 1px solid var(--line);
    background: #ffffff;
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
    text-align: left;
    font-family: var(--font-sans);
    color: var(--text-main);
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .theme-btn:hover {
    border-color: var(--accent);
    background: var(--bg-hover);
  }
  .theme-btn.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  .theme-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .theme-preview {
    display: flex;
    gap: 6px;
  }
  .theme-preview i {
    display: block;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(16,24,40,0.1);
  }
  :root[data-theme-mode="dark"] {
    color-scheme: dark;
  }
  :root[data-theme-mode="dark"] #app {
    border-color: rgba(148, 163, 184, 0.2);
    box-shadow: 0 24px 48px -24px rgba(0, 0, 0, 0.65), 0 8px 16px -12px rgba(0, 0, 0, 0.55);
  }
  :root[data-theme-mode="dark"] #chat-header,
  :root[data-theme-mode="dark"] #network-header,
  :root[data-theme-mode="dark"] .modal,
  :root[data-theme-mode="dark"] .file-card,
  :root[data-theme-mode="dark"] .msg-actions,
  :root[data-theme-mode="dark"] #input-wrapper,
  :root[data-theme-mode="dark"] .theme-btn,
  :root[data-theme-mode="dark"] .btn-inline,
  :root[data-theme-mode="dark"] .notification-item,
  :root[data-theme-mode="dark"] .notifications-empty,
  :root[data-theme-mode="dark"] .toast {
    background: var(--bg) !important;
    border-color: var(--line);
    color: var(--text-main);
  }
  :root[data-theme-mode="dark"] .form-input {
    background: var(--bg);
    border-color: var(--line);
    color: var(--text-main);
  }
  :root[data-theme-mode="dark"] .btn-ghost {
    border-color: var(--line);
  }
  :root[data-theme-mode="dark"] .rail-badge,
  :root[data-theme-mode="dark"] .messages-header-badge {
    background: var(--bg-active);
    color: var(--text-main);
  }
  .notifications-modal {
    width: 520px;
  }
  .notifications-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .notifications-actions {
    display: flex;
    gap: 8px;
  }
  .btn-inline {
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-main);
    cursor: pointer;
  }
  .btn-inline:hover {
    background: var(--bg-hover);
  }
  #notifications-list {
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    max-height: 320px;
    overflow-y: auto;
  }
  .notification-item {
    width: 100%;
    border: none;
    border-bottom: 1px solid var(--line);
    background: #fff;
    padding: 12px;
    text-align: left;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .notification-item:last-child {
    border-bottom: none;
  }
  .notification-item:hover {
    background: var(--bg-hover);
  }
  .notification-title {
    font-size: 14px;

let state = {

function applyTheme(themeName) {
  const t = THEMES[themeName] || THEMES.default;
  const root = document.documentElement;
  root.setAttribute('data-theme-mode', t.mode === 'dark' ? 'dark' : 'light');
  root.style.setProperty('--canvas', t.canvas);
  root.style.setProperty('--bg', t.bg);
  root.style.setProperty('--bg-rail', t.bgRail);
  root.style.setProperty('--bg-hover', t.bgHover);
  root.style.setProperty('--bg-active', t.bgActive);
  root.style.setProperty('--line', t.line);
  root.style.setProperty('--text-main', t.textMain);
  root.style.setProperty('--text-muted', t.textMuted);
  root.style.setProperty('--text-soft', t.textSoft);
  root.style.setProperty('--accent', t.accent);
  root.style.setProperty('--accent-bg', t.accentBg);
  root.style.setProperty('--green', t.green);
  root.style.setProperty('--green-bg', t.greenBg);
  root.style.setProperty('--green-txt', t.greenTxt);
  document.querySelectorAll('.theme-btn').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.theme === themeName);
  });
}

function setTheme(themeName) {
  applyTheme(themeName);
  localStorage.setItem(THEME_STORAGE_KEY, themeName);
  document.getElementById('theme-modal').style.display = 'none';
}

function openThemeModal() {

function getUnreadRooms() {
  return state.rooms
    .filter((room) => Number(room.unreadCount || 0) > 0)
    .sort((a, b) => {
      const aTs = a.lastMessage?.createdAt ? new Date(a.lastMessage.createdAt).getTime() : 0;
      const bTs = b.lastMessage?.createdAt ? new Date(b.lastMessage.createdAt).getTime() : 0;
      return bTs - aTs;
    });
}

function renderNotificationsList() {
  const list = document.getElementById('notifications-list');
  const unreadRooms = getUnreadRooms();
  if (!unreadRooms.length) {
    list.innerHTML = '<div class="notifications-empty">No new notifications</div>';
    return;
  }
  list.innerHTML = unreadRooms.map((room) => {
    const title = esc(getRoomName(room));
    const count = Number(room.unreadCount || 0);
    const preview = esc(room.lastMessage?.content || room.description || 'New activity');
    return `
      <button class="notification-item" type="button" data-room-id="${room.id}">
        <div>
          <div class="notification-title">${title}</div>
          <div class="notification-preview">${preview}</div>
        </div>
        <div class="notification-count">${count}</div>
      </button>
    `;
  }).join('');
}

function openNotificationsModal() {
  renderNotificationsList();
  document.getElementById('notifications-modal').style.display = 'flex';
}

function closeNotificationsModal() {
  document.getElementById('notifications-modal').style.display = 'none';
}

async function markAllNotificationsRead() {
  const unreadRooms = getUnreadRooms();
  if (!unreadRooms.length) return;

  await Promise.all(unreadRooms.map((room) =>
    apiGet(`/rooms/${room.id}/messages?limit=1`).catch(() => null)
  ));

  await loadRooms();
  renderNotificationsList();
}

    document.getElementById('empty-state').style.display = 'flex';

// ════════════════════════════════════════════════════════════════════════
// NETWORK GRAPH (VIS.JS)
// ════════════════════════════════════════════════════════════════════════
let network = null;

async function initNetworkGraph() {
  const container = document.getElementById('graph-container');
  if (network !== null) {
      network.destroy();
  }

  container.innerHTML = '<div style="padding:16px;color:var(--text-soft);">Loading network...</div>';
  let graph;
  try {
    graph = await apiGet('/social/graph');
  } catch (err) {
    container.innerHTML = '<div style="padding:16px;color:#b42318;">Failed to load network</div>';
    return;
  }

  const nodesArray = [];
  const edgesArray = [];

  nodesArray.push({
    id: graph.me.id,
    label: graph.me.displayName || graph.me.username || 'Me',
    group: 'me',
    value: 20,
  });

  for (const friend of graph.friends || []) {
    nodesArray.push({
      id: friend.id,
      label: friend.displayName || friend.username || 'Friend',
      group: 'friend',
      value: Math.max(6, Math.round((friend.chatFreq || 0) / 3)),
    });
  }

  for (const fof of graph.friendsOfFriends || []) {
    nodesArray.push({
      id: fof.id,
      label: fof.displayName || fof.username || 'User',
      group: 'fof',
      value: Math.max(4, Math.round((fof.chatFreq || 0) / 5)),
    });
  }

  for (const link of graph.links || []) {
    const isFriend = link.kind === 'friend';
    edgesArray.push({
      from: link.source,
      to: link.target,
      width: isFriend ? 2 : 1,
      color: { color: isFriend ? '#98a2b3' : '#eaecf0' },
    });
  }

  const nodes = new vis.DataSet(nodesArray);
  const edges = new vis.DataSet(edgesArray);

  const data = {
    nodes: nodes,
    edges: edges
  };

  const options = {
    nodes: {
      shape: "dot",
      scaling: {
        customScalingFunction: function (min, max, total, value) {
          return value / total;
        },
        min: 10,
        max: 50
      },
      font: {
        size: 14,
        face: 'Inter',
        color: '#101828'
      }
    },
    groups: {
      me: {
        color: { background: "#1570ef", border: "#175cd3" },
        font: { color: "white" }
      },
      friend: {
        color: { background: "#12b76a", border: "#027a48" }
      },
      fof: {
        color: { background: "#f2f4f7", border: "#d0d5dd" }
      }
    },
    edges: {
      color: {
        color: '#d0d5dd',
        highlight: '#1570ef',
        hover: '#1570ef'
      },
      smooth: {
        type: 'continuous'
      }
    },
    physics: {
      stabilization: false,
      barnesHut: {
        gravitationalConstant: -2000,
        springConstant: 0.04,
        springLength: 95
      }
    },
    interaction: {
        hover: true
    }
  };

  network = new vis.Network(container, data, options);
}

// ════════════════════════════════════════════════════════════════════════
// REST OF API AND LOGIC 
// ════════════════════════════════════════════════════════════════════════

function saveAuth() {
  if (state.accessToken) {
    sessionStorage.setItem('accessToken', state.accessToken);
    sessionStorage.setItem('refreshToken', state.refreshToken || '');
    sessionStorage.setItem('user', JSON.stringify(state.user));
  } else {
    sessionStorage.clear();
  }
}

function loadAuth() {
  const at = sessionStorage.getItem('accessToken');
  const u = sessionStorage.getItem('user');
  if (at && u) {
    state.accessToken = at;
    state.refreshToken = sessionStorage.getItem('refreshToken');
    state.user = JSON.parse(u);
    return true;
  }
  return false;
}

async function apiFetch(path, options = {}) {
  const headers = { ...(options.headers || {}) };
  const isFormData = typeof FormData !== 'undefined' && options.body instanceof FormData;
  if (!isFormData && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  if (state.accessToken) headers['Authorization'] = `Bearer ${state.accessToken}`;

  let res = await fetch(API + path, { ...options, headers });
  if (res.status === 401 && state.refreshToken) {
    const refreshRes = await fetch(API + '/auth/refresh', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken: state.refreshToken }),
    });
    if (refreshRes.ok) {
      const data = await refreshRes.json();
      state.accessToken = data.accessToken;
      state.refreshToken = data.refreshToken;
      saveAuth();
      headers['Authorization'] = `Bearer ${state.accessToken}`;
      res = await fetch(API + path, { ...options, headers });
    } else {
      logout(); return null;
    }
  }
  return res;
}
async function apiGet(path) { const r = await apiFetch(path); return r && r.ok ? r.json() : Promise.reject(await r?.json().catch(()=>({}))); }
async function apiPost(path, body) { const r = await apiFetch(path, { method: 'POST', body: JSON.stringify(body) }); return r && r.ok ? r.json() : Promise.reject(await r?.json().catch(()=>({}))); }
async function apiUploadAttachment(file) {
  const form = new FormData(); form.append('file', file);
  const r = await apiFetch(`/rooms/${state.currentRoomId}/messages/attachments`, { method: 'POST', body: form, headers: {} });
  return r && r.ok ? r.json() : Promise.reject(await r?.json().catch(()=>({})));
}

function toast(msg, type = 'info') {
  const el = document.createElement('div'); el.className = `toast ${type}`; el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ════════════════════════════════════════════════════════════════════════
// AUTH & SOCKET.IO
// ════════════════════════════════════════════════════════════════════════
async function login(username, password) {
  try {
    const data = await apiPost('/auth/login', { username, password });
    state.user = data.user; state.accessToken = data.accessToken; state.refreshToken = data.refreshToken;
    saveAuth(); onAuthenticated();
  } catch (err) { showError(err.error || 'Login failed'); }
}
async function register(username, displayName, email, password) {
  try {
    const data = await apiPost('/auth/register', { username, displayName, email, password });
    state.user = data.user; state.accessToken = data.accessToken; state.refreshToken = data.refreshToken;
    saveAuth(); onAuthenticated();
  } catch (err) { showError(err.error || 'Registration failed'); }
}
function logout() {
  if (state.socket) state.socket.disconnect();
  state = { ...state, user: null, accessToken: null, refreshToken: null, rooms: [], currentRoomId: null, messages: [] };
  saveAuth(); document.getElementById('auth-modal').style.display = 'flex';
}

function connectSocket() {
  if (state.socket?.connected) return;
  const socket = io(BACKEND_ORIGIN, {
    path: '/socket.io',
    auth: { token: state.accessToken },
    transports: ['websocket', 'polling'],
    reconnection: true,
  });
  state.socket = socket;

  socket.on('message:new', (payload) => {
    if (!payload) return;
    if (payload.roomId === state.currentRoomId) {
      addMessageToView(payload, true);
      scrollToBottom();
    } else {
      const room = state.rooms.find((r) => r.id === payload.roomId);
      if (room) {
        room.unreadCount = Number(room.unreadCount || 0) + 1;
        renderSidebar();
        if (document.getElementById('notifications-modal').style.display === 'flex') {
          renderNotificationsList();
        }
      }
    }
  });

  socket.on('message:edited', (payload) => {
    if (!payload?.id) return;
    const idx = state.messages.findIndex((m) => m.id === payload.id);
    if (idx >= 0) {
      state.messages[idx] = payload;
      renderMessages();
    }
  });

  socket.on('message:deleted', (payload) => {
    if (!payload?.messageId) return;
    const idx = state.messages.findIndex((m) => m.id === payload.messageId);
    if (idx >= 0) {
      state.messages[idx] = { ...state.messages[idx], deletedAt: new Date().toISOString(), content: '' };
      renderMessages();
    }
  });

  socket.on('presence', (payload) => {
    if (payload?.userId) updatePresence(payload.userId, payload.isOnline);
  });
}

function updatePresence(userId, isOnline) {
  state.rooms.forEach(room => {
    const member = room.members?.find(m => m.user.id === userId);
    if (member) member.user.isOnline = isOnline;
  });
  if (state.currentRoomId) {
    const currentRoom = state.rooms.find(r => r.id === state.currentRoomId);
    if (currentRoom && currentRoom.type === 'direct') {
      const other = currentRoom.members?.find(m => m.user.id !== state.user.id)?.user;
      if (other && other.id === userId) {
        document.getElementById('chat-header-status').style.display = isOnline ? 'flex' : 'none';
      }
    }
  }
  renderActiveUsers();
}

// ════════════════════════════════════════════════════════════════════════
// ROOMS RENDERING
// ════════════════════════════════════════════════════════════════════════
async function loadRooms() {
  try {
    const data = await apiGet('/rooms');
    state.rooms = data.rooms;
    renderSidebar();
    renderActiveUsers();
  } catch (err) { toast(err.error || 'Failed to load rooms', 'error'); }
}

function renderSidebar() {
  const dms = state.rooms.filter(r => r.type === 'direct');
  const groups = state.rooms.filter(r => r.type !== 'direct');
  document.getElementById('dm-list').innerHTML = dms.map(r => renderRoomItem(r)).join('');
  document.getElementById('room-list').innerHTML = groups.map(r => renderRoomItem(r)).join('');
  renderNotificationBadge();
}

function renderNotificationBadge() {
  const badge = document.getElementById('nav-notifications-badge');
  if (!badge) return;
  const totalUnread = state.rooms.reduce((sum, room) => sum + Number(room.unreadCount || 0), 0);
  badge.textContent = String(totalUnread);
  badge.style.display = totalUnread > 0 ? 'inline-block' : 'none';
}

function renderActiveUsers() {
  const holder = document.getElementById('active-users-list');
  if (!holder) return;

  const unique = new Map();
  for (const room of state.rooms) {
    for (const member of (room.members || [])) {
      const user = member.user;
      if (!user || user.id === state.user?.id) continue;
      if (!user.isOnline) continue;
      if (!unique.has(user.id)) unique.set(user.id, user);
    }
  }

  const activeUsers = [...unique.values()].slice(0, 12);
  if (!activeUsers.length) {
    holder.innerHTML = '<div style="font-size:12px;color:var(--text-soft);padding:4px 0;">No one online</div>';
    return;
  }

  holder.innerHTML = activeUsers.map((u) => {
    const initials = (u.displayName || u.username || '?').slice(0, 2).toUpperCase();
    const avatar = u.avatarUrl
      ? `<img src="${esc(u.avatarUrl)}" alt="${esc(u.displayName || u.username || 'user')}">`
      : `<span>${esc(initials)}</span>`;
    return `<div class="active-dot" title="${esc(u.displayName || u.username || 'User')}">${avatar}<div class="status-indicator"></div></div>`;
  }).join('');
}

function getRoomName(room) {
  if (room.type === 'direct') {
    const other = room.members?.find(m => m.user.id !== state.user?.id);
    return other ? other.user.displayName : 'Unknown';
  }
  return room.name || 'Group Room';
}

function renderRoomItem(room) {
  const name = getRoomName(room);
  const active = room.id === state.currentRoomId ? 'active' : '';
  let avatarHtml = `<span>${name.slice(0, 2).toUpperCase()}</span>`;
  let subtitle = room.description || '';
  
  if (room.type === 'direct') {
    const other = room.members?.find(m => m.user.id !== state.user?.id)?.user;
    if (other?.avatarUrl) avatarHtml = `<img src="${esc(other.avatarUrl)}" alt="">`;
    subtitle = `@${other?.username || 'direct'}`;
  }

  const timeStr = "20min ago"; 

  return `
    <div class="room-item ${active}" onclick="selectRoom('${room.id}')">
      <div class="room-avatar">${avatarHtml}</div>
      <div class="room-content">
        <div class="room-top">
          <div class="room-name">${esc(name)}</div>
          <div class="room-time">${timeStr}</div>
        </div>
        <div class="room-preview">${esc(subtitle)}</div>
      </div>
    </div>`;
}

async function selectRoom(roomId) {
  state.currentRoomId = roomId;
  state.messages = [];
  const selectedRoom = state.rooms.find((r) => r.id === roomId);
  if (selectedRoom) selectedRoom.unreadCount = 0;
  renderSidebar(); 

  const room = state.rooms.find(r => r.id === roomId);
  if (!room) return;

  showView('chat-view');

  const name = getRoomName(room);
  document.getElementById('chat-header-name').textContent = name;
  
  const avatarEl = document.getElementById('chat-header-avatar');
  const handleEl = document.getElementById('chat-header-handle');
  const statusEl = document.getElementById('chat-header-status');

  if (room.type === 'direct') {
    const other = room.members?.find(m => m.user.id !== state.user?.id)?.user;
    avatarEl.innerHTML = other?.avatarUrl ? `<img src="${esc(other.avatarUrl)}" alt="">` : `<span>${name.slice(0,2).toUpperCase()}</span>`;
    handleEl.textContent = `@${other?.username || ''}`;
    statusEl.style.display = other?.isOnline ? 'flex' : 'none';
  } else {
    avatarEl.innerHTML = `<span>#</span>`;
    handleEl.textContent = `${room.members?.length || 0} members`;
    statusEl.style.display = 'none';
  }

  document.getElementById('messages-container').innerHTML = '';
  await loadMessages();
  scrollToBottom(true);
}

// ════════════════════════════════════════════════════════════════════════
// MESSAGES RENDERING
// ════════════════════════════════════════════════════════════════════════
async function loadMessages() {
  if (!state.currentRoomId) return;
  try {
    const data = await apiGet(`/rooms/${state.currentRoomId}/messages?limit=50`);
    state.messages = data.messages;
    renderMessages();
  } catch (err) { toast('Failed to load messages', 'error'); }
}

function isCompactMessage(prevMsg, msg) {
  if (!prevMsg || !msg) return false;
  if (prevMsg.sender?.id !== msg.sender?.id) return false;
  const diff = new Date(msg.createdAt).getTime() - new Date(prevMsg.createdAt).getTime();
  return diff < 5 * 60 * 1000;
}

function renderMessages() {
  const container = document.getElementById('messages-container');
  container.innerHTML = '';
  let prevMsg = null;
  let lastDate = null;

  for (const msg of state.messages) {
    const dStr = new Date(msg.createdAt).toDateString();
    if (dStr !== lastDate) {
      const div = document.createElement('div'); div.className = 'date-divider';
      div.textContent = dStr === new Date().toDateString() ? 'Today' : new Date(msg.createdAt).toLocaleDateString('en-US', {weekday:'long'});
      container.appendChild(div);
      lastDate = dStr;
      prevMsg = null;
    }
    const el = createMessageEl(msg, prevMsg);
    container.appendChild(el);
    prevMsg = msg;
  }
}

function createMessageEl(msg, prevMsg = null) {
  const group = document.createElement('div');
  const isMe = msg.sender?.id === state.user?.id;
  group.className = `message-group ${isMe ? 'mine' : ''}`;
  if (isCompactMessage(prevMsg, msg)) group.classList.add('compact');

  const senderName = isMe ? 'You' : (msg.sender?.displayName || 'Unknown');
  const timeStr = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  // Avatar block
  let avatarHtml = '';
  if (!isMe) {
    const initials = senderName.slice(0,2).toUpperCase();
    const imgStr = msg.sender?.avatarUrl ? `<img src="${esc(msg.sender.avatarUrl)}">` : `<span>${initials}</span>`;
    avatarHtml = `<div class="msg-avatar">${imgStr}</div>`;
  }

  // Attachments
  let attachmentsHtml = '';
  if (msg.attachments && msg.attachments.length > 0) {
    attachmentsHtml = `<div class="msg-attachments">` + msg.attachments.map(att => {
      const name = esc(att.filename || 'Attachment');
      const publicUrl = String(att.publicUrl || '');
      const mimeType = String(att.mimeType || '');
      const attachmentType = String(att.attachmentType || 'document');
      const url = esc(publicUrl || '#');
      const isImg = attachmentType === 'image' || mimeType.startsWith('image/');

      if (isImg && publicUrl) {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer"><img class="msg-attachment-image" src="${url}" alt="${name}"></a>`;
      }
      if (!publicUrl) {
        return `
        <div class="file-card">
          <div class="file-icon">📄</div>
          <div class="file-info">
            <div class="file-name">${name}</div>
            <div class="file-meta">File unavailable</div>
          </div>
        </div>`;
      }
      return `
        <a href="${url}" target="_blank" rel="noopener noreferrer" class="file-card">
          <div class="file-icon">📄</div>
          <div class="file-info">
            <div class="file-name">${name}</div>
            <div class="file-meta">${esc(attachmentType || 'document')}</div>
          </div>
        </a>`;
    }).join('') + `</div>`;
  }

  const contentStr = esc(msg.content).replace(/\n/g, '<br>');

  group.innerHTML = `
    ${avatarHtml}
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-author">${esc(senderName)}</span>
        <span class="msg-time">${timeStr}</span>
      </div>
      ${contentStr ? `<div class="msg-content">${contentStr}</div>` : ''}
      ${attachmentsHtml}
    </div>
    <div class="msg-actions">
      <button class="msg-action-btn">☺</button>
      <button class="msg-action-btn">↩</button>
    </div>
  `;
  return group;
}

function addMessageToView(msg, isNew = false) {
  const container = document.getElementById('messages-container');
  const prev = state.messages[state.messages.length - 1];
  container.appendChild(createMessageEl(msg, prev));
  state.messages.push(msg);
}

function renderPendingAttachments() {
  const holder = document.getElementById('pending-attachments');
  if (!holder) return;
  if (!state.pendingAttachments.length) {
    holder.style.display = 'none';
    holder.innerHTML = '';
    return;
  }
  holder.style.display = 'flex';
  holder.innerHTML = state.pendingAttachments.map((att) => {
    const name = esc(att.filename || 'Attachment');
    const type = esc(att.attachmentType || 'document');
    return `<div style="background:#f2f4f7; padding:4px 8px; border-radius:4px; font-size:12px;">${name} · ${type}</div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if ((!content && state.pendingAttachments.length === 0) || !state.currentRoomId) return;

  const payload = { content, attachmentIds: state.pendingAttachments.map(a => a.id) };
  input.value = '';
  state.pendingAttachments = [];
  renderPendingAttachments();

  try {
    const res = await apiPost(`/rooms/${state.currentRoomId}/messages`, payload);
    if (!state.socket?.connected && res?.message) {
      addMessageToView(res.message, true);
      scrollToBottom();
    }
  } catch (err) { toast('Failed to send message', 'error'); }
}

function scrollToBottom(instant = false) {
  const c = document.getElementById('messages-container');
  c.scrollTo({ top: c.scrollHeight, behavior: instant ? 'auto' : 'smooth' });
}

function esc(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ════════════════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ════════════════════════════════════════════════════════════════════════
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('attach-btn').addEventListener('click', () => {
  if(state.currentRoomId) document.getElementById('attachment-input').click();
});

document.getElementById('attachment-input').addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  if (file) {
    try {
      const data = await apiUploadAttachment(file);
      if (data?.attachment) {
        state.pendingAttachments.push(data.attachment);
        renderPendingAttachments();
      }
    } catch (err) { toast('Upload failed', 'error'); }
  }
  e.target.value = '';
});

// Modals
document.querySelectorAll('.form-tab').forEach(t => t.addEventListener('click', (e) => {
  document.querySelectorAll('.form-tab').forEach(btn => btn.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('login-form').style.display = e.target.dataset.tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = e.target.dataset.tab === 'register' ? 'block' : 'none';
}));

document.getElementById('login-btn').addEventListener('click', () => {
  login(document.getElementById('login-username').value, document.getElementById('login-password').value);
});
document.getElementById('register-btn').addEventListener('click', () => {
  register(document.getElementById('reg-username').value, document.getElementById('reg-displayname').value, document.getElementById('reg-email').value, document.getElementById('reg-password').value);
});

function showError(msg) { const el = document.getElementById('auth-error'); el.textContent = msg; el.style.display = 'block'; }
async function onAuthenticated() {
  document.getElementById('auth-modal').style.display = 'none';
  await loadRooms();
  connectSocket();
}
document.getElementById('logout-btn').addEventListener('click', logout);
document.getElementById('cancel-theme-modal').addEventListener('click', () => {
  document.getElementById('theme-modal').style.display = 'none';
});
document.querySelectorAll('.theme-btn').forEach((btn) => {
  btn.addEventListener('click', () => setTheme(btn.dataset.theme));
});
document.getElementById('close-notifications-modal').addEventListener('click', closeNotificationsModal);
document.getElementById('mark-all-read-btn').addEventListener('click', async () => {
  await markAllNotificationsRead();
  toast('All notifications marked as read', 'success');
});
document.getElementById('notifications-list').addEventListener('click', (e) => {
  const target = e.target.closest('.notification-item');
  if (!target) return;
  const roomId = target.dataset.roomId;
  if (!roomId) return;
  closeNotificationsModal();
  selectRoom(roomId);
});
document.getElementById('notifications-modal').addEventListener('click', (e) => {
  if (e.target.id === 'notifications-modal') closeNotificationsModal();
});

// New DM flow
document.getElementById('new-dm-btn').addEventListener('click', () => {
  openUserSearchModal();
});
document.getElementById('cancel-new-dm').addEventListener('click', () => {
  document.getElementById('new-dm-modal').style.display = 'none';
});
function openUserSearchModal() {
  document.getElementById('new-dm-modal').style.display = 'flex';
  const input = document.getElementById('dm-search-input');
  input.value = '';
  document.getElementById('dm-search-results').style.display = 'none';
  input.focus();
}
document.getElementById('dm-search-input').addEventListener('input', async (e) => {
  const q = e.target.value.trim();
  const resEl = document.getElementById('dm-search-results');
  if (q.length < 2) { resEl.style.display = 'none'; return; }
  try {
    const data = await apiGet(`/rooms/users/search?q=${encodeURIComponent(q)}`);
    resEl.innerHTML = data.users.map(u => `
      <div style="padding:12px; border-bottom:1px solid #eaecf0; cursor:pointer;" onclick="startDM('${u.id}')">
        <div style="font-weight:500;">${esc(u.displayName)}</div>
        <div style="font-size:12px; color:#667085;">@${esc(u.username)}</div>
      </div>
    `).join('');
    resEl.style.display = 'block';
  } catch(e){}
});
async function startDM(userId) {
  document.getElementById('new-dm-modal').style.display = 'none';
  try {
    const data = await apiPost(`/rooms/dm/${userId}`, {});
    await loadRooms();
    selectRoom(data.room.id);
  } catch (err) { toast('Failed to start chat', 'error'); }
}

async function init() {
  applyTheme(localStorage.getItem(THEME_STORAGE_KEY) || 'default');
  if (loadAuth()) { onAuthenticated(); } else { document.getElementById('auth-modal').style.display = 'flex'; }
}
init();
</script>
