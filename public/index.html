<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Untitled UI - Messages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  /* ─── RESET & BASE ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #ffffff;
    --bg-rail:   #fcfcfd;
    --bg-hover:  #f9fafb;
    --bg-active: #f2f4f7;
    --line:      #eaecf0;
    --text-main: #101828;
    --text-muted:#475467;
    --text-soft: #667085;
    --accent:    #1570ef;
    --accent-bg: #eff8ff;
    --green:     #12b76a;
    --green-bg:  #ecfdf3;
    --green-txt: #027a48;
    --radius:    8px;
    --font-sans: 'Inter', system-ui, sans-serif;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: #f2f4f7;
    color: var(--text-main);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── SCROLLBAR ─────────────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #98a2b3; }

  /* ─── LAYOUT ─────────────────────────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-columns: 260px 340px 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
    width: 100vw;
    background: var(--bg);
  }

  /* ─── RAIL (Sidebar 1) ─────────────────────────────────────────────────── */
  #nav-rail {
    background: var(--bg);
    border-right: 1px solid var(--line);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .rail-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
    color: var(--text-main);
    font-size: 16px;
    padding: 0 8px;
  }

  .rail-cube {
    width: 32px;
    height: 32px;
    background: #101828;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
  }

  .rail-nav {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .rail-item {
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s;
  }

  .rail-item:hover { background: var(--bg-hover); color: var(--text-main); }
  
  .rail-item.active {
    background: var(--bg-hover);
    color: var(--text-main);
  }

  .rail-icon {
    font-size: 18px;
    color: var(--text-soft);
  }
  .rail-item.active .rail-icon { color: var(--text-main); }

  .rail-badge {
    margin-left: auto;
    background: #f2f4f7;
    color: #344054;
    font-size: 12px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 16px;
  }

  .rail-foot { margin-top: auto; }

  /* ─── INBOX (Sidebar 2) ──────────────────────────────────────────────────── */
  #sidebar {
    background: var(--bg);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #inbox-search-wrap {
    padding: 24px 20px 16px;
  }

  .search-input-box {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-input-box::before {
    content: "🔍";
    position: absolute;
    left: 12px;
    font-size: 12px;
    color: var(--text-soft);
    filter: grayscale(100%) opacity(0.6);
  }

  #inbox-search {
    width: 100%;
    height: 44px;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    padding: 0 14px 0 36px;
    background: #ffffff;
    color: var(--text-main);
    font-family: var(--font-sans);
    font-size: 15px;
    outline: none;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #inbox-search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-bg);
  }

  #active-strip {
    padding: 0 20px 24px;
    border-bottom: 1px solid var(--line);
  }

  .section-label {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 12px;
  }

  .active-avatars {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .active-avatars::-webkit-scrollbar { display: none; }

  .active-dot {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--bg-active);
    position: relative;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
  }
  .active-dot img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }

  .status-indicator {
    position: absolute;
    right: 2px;
    bottom: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--green);
    border: 2px solid #ffffff;
  }

  #rooms-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
  }

  .messages-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px 12px;
  }

  .messages-header-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .messages-header-badge {
    background: #f2f4f7;
    color: #344054;
    font-size: 12px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 16px;
  }

  .compose-btn {
    background: transparent;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
    transition: all 0.15s;
  }
  .compose-btn:hover { background: var(--bg-hover); color: var(--text-main); }

  .room-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    margin-bottom: 2px;
  }
  .room-item:hover { background: var(--bg-hover); }
  .room-item.active { background: var(--bg-hover); }

  .room-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--bg-active);
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    color: var(--text-muted);
  }
  .room-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

  .room-content {
    flex: 1;
    min-width: 0;
  }

  .room-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }

  .room-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .room-time {
    font-size: 12px;
    color: var(--text-soft);
    flex-shrink: 0;
  }

  .room-preview {
    font-size: 14px;
    color: var(--text-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── MAIN CONTENT (Chat & Network) ────────────────────────────────────── */
  #main {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
  }

  #chat-header {
    border-bottom: 1px solid var(--line);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: #ffffff;
  }

  #chat-header-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--bg-active);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-muted);
    position: relative;
  }
  #chat-header-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

  .chat-header-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .chat-header-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #chat-header-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-main);
  }

  .online-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--green-bg);
    color: var(--green-txt);
    padding: 2px 8px;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid #abefc6;
  }
  .online-pill::before {
    content: '';
    display: block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  #chat-header-handle {
    font-size: 14px;
    color: var(--text-soft);
  }

  /* ─── MESSAGES ──────────────────────────────────────────────────────────── */
  #messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .date-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 16px 0;
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 500;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .message-group {
    display: flex;
    gap: 16px;
    width: 100%;
    position: relative;
  }
  
  .message-group.compact {
    margin-top: -16px;
  }
  .message-group.compact .msg-avatar { opacity: 0; }
  .message-group.compact .msg-meta { display: none; }

  /* Incoming Message */
  .msg-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--bg-active);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    color: var(--text-muted);
  }
  .msg-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

  .msg-body {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 70%;
  }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .msg-author {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
  }

  .msg-time {
    font-size: 12px;
    color: var(--text-soft);
  }

  .msg-content {
    font-size: 15px;
    color: var(--text-main);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Outgoing Message (Mine) */
  .message-group.mine {
    justify-content: flex-end;
  }
  .message-group.mine .msg-avatar {
    display: none;
  }
  .message-group.mine .msg-body {
    align-items: flex-end;
  }
  .message-group.mine .msg-meta {
    flex-direction: row-reverse;
  }
  .message-group.mine .msg-content {
    background: var(--accent);
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 12px 12px 0 12px;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
  }

  /* Attachments */
  .msg-attachments {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }
  
  .file-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
    text-decoration: none;
    max-width: 320px;
    transition: background 0.15s;
  }
  .file-card:hover { background: var(--bg-hover); }

  .file-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f2f4f7;
    border-radius: 6px;
    border: 1px solid var(--line);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .file-info {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .file-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .file-meta {
    font-size: 12px;
    color: var(--text-soft);
  }

  .msg-attachment-image {
    max-width: 280px;
    border-radius: 8px;
    border: 1px solid var(--line);
  }

  .msg-actions {
    position: absolute;
    right: 0;
    top: -16px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 6px;
    display: flex;
    padding: 2px;
    opacity: 0;
    box-shadow: 0 2px 4px rgba(16,24,40,0.05);
    transition: opacity 0.15s;
  }
  .message-group:hover .msg-actions { opacity: 1; }
  .message-group.mine .msg-actions { right: auto; left: 0; }

  .msg-action-btn {
    background: none;
    border: none;
    padding: 4px 8px;
    cursor: pointer;
    color: var(--text-soft);
    border-radius: 4px;
  }
  .msg-action-btn:hover { background: var(--bg-hover); color: var(--text-main); }

  /* ─── INPUT AREA ────────────────────────────────────────────────────────── */
  #input-area {
    padding: 0 32px 32px;
  }

  #input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px 16px;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    background: #ffffff;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-bg);
  }

  .input-action {
    background: none;
    border: none;
    color: var(--text-soft);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
  }
  .input-action:hover { color: var(--text-main); background: var(--bg-hover); }

  #msg-input {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--font-sans);
    font-size: 15px;
    color: var(--text-main);
    max-height: 150px;
    padding: 4px 0;
    background: transparent;
  }
  #msg-input::placeholder { color: #98a2b3; }

  #send-btn {
    background: var(--accent);
    color: #ffffff;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(16,24,40,0.05);
  }
  #send-btn:hover { background: #175cd3; }

  /* Utilities */
  .system-msg { text-align: center; color: var(--text-soft); font-size: 13px; margin: 16px 0; }
  #empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-soft); }
  
  /* ─── NETWORK GRAPH VIEW ────────────────────────────────────────────────── */
  #network-view {
    display: none;
    flex-direction: column;
    height: 100%;
    width: 100%;
    background: var(--bg);
  }
  #network-header {
    border-bottom: 1px solid var(--line);
    padding: 20px 24px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #network-header h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-main);
  }
  .network-seed-btn {
    border: 1px solid #d0d5dd;
    background: #fff;
    color: var(--text-main);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .network-seed-btn:hover { background: var(--bg-hover); }
  #graph-container {
    flex: 1;
    width: 100%;
    height: 100%;
    background: #fcfcfd;
  }

  /* Required Overlays/Modals (Simplified visually) */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(16,24,40,0.5); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal {
    background: #ffffff; border-radius: 12px; padding: 24px; width: 400px; max-width: 90vw;
    box-shadow: 0 20px 24px -4px rgba(16,24,40,0.08), 0 8px 8px -4px rgba(16,24,40,0.03);
  }
  .modal-title { font-size: 18px; font-weight: 600; color: var(--text-main); margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 14px; font-weight: 500; color: var(--text-main); margin-bottom: 6px; }
  .form-input {
    width: 100%; padding: 10px 14px; border: 1px solid #d0d5dd; border-radius: 8px; font-family: var(--font-sans); font-size: 15px;
  }
  .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-bg); }
  .btn {
    width: 100%; background: var(--accent); color: white; border: none; border-radius: 8px;
    padding: 10px 16px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px;
  }
  .btn:hover { background: #175cd3; }
  .btn-ghost { background: transparent; color: var(--text-main); border: 1px solid #d0d5dd; }
  .btn-ghost:hover { background: var(--bg-hover); }
  .form-tabs { display: flex; gap: 16px; margin-bottom: 24px; border-bottom: 1px solid var(--line); }
  .form-tab {
    background: none; border: none; padding: 0 0 12px; font-size: 15px; font-weight: 500;
    color: var(--text-soft); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .form-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .error-msg { background: #fef3f2; color: #b42318; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
  
  #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: #ffffff; border: 1px solid var(--line); padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 6px -1px rgba(16,24,40,0.1); }
  .toast.success { border-left: 4px solid var(--green); }
  .toast.error { border-left: 4px solid #f04438; }

  /* Misc helpers to hide elements that are purely structural */
  #ws-status, #attachment-input, #palette-picker { display: none; }
</style>
</head>
<body>

<div id="app">
  <aside id="nav-rail">
    <div class="rail-brand">
      <div class="rail-cube">◫</div>
      <span>Untitled UI</span>
    </div>
    <nav class="rail-nav">
      <button class="rail-item" id="nav-network-btn"><span class="rail-icon">⌂</span> Network</button>
      <button class="rail-item"><span class="rail-icon">◫</span> Dashboard</button>
      <button class="rail-item"><span class="rail-icon">▣</span> Projects</button>
      <button class="rail-item"><span class="rail-icon">☑</span> Tasks <span class="rail-badge">10</span></button>
      <button class="rail-item"><span class="rail-icon">◔</span> Reporting</button>
      <button class="rail-item"><span class="rail-icon">◎</span> Users</button>
      <button class="rail-item active" id="nav-messages-btn"><span class="rail-icon">💬</span> Messages <span class="rail-badge">20</span></button>
    </nav>
    <nav class="rail-nav rail-foot">
      <button class="rail-item" id="nav-notifications-btn">Notifications <span class="rail-badge" id="nav-notifications-badge">0</span></button>
      <button class="rail-item" id="logout-btn"><span class="rail-icon">⏏</span> Logout</button>
    </nav>
  </aside>

  <aside id="sidebar">
    <div id="inbox-search-wrap">
      <div class="search-input-box">
        <input id="inbox-search" type="text" placeholder="Search" />
      </div>
    </div>
    
    <div id="active-strip">
      <div class="section-label">Active</div>
      <div class="active-avatars" id="active-users-list"></div>
    </div>

    <div id="rooms-container">
      <div class="messages-header">
        <div class="messages-header-title">Messages <span class="messages-header-badge">40</span></div>
        <button class="compose-btn" id="new-dm-btn" title="New Message">✎</button>
      </div>
      <div id="dm-list"></div>
      <div id="room-list"></div>
    </div>
  </aside>

  <main id="main">
    <div id="empty-state">

<div id="toast-container"></div>

<script>
// ════════════════════════════════════════════════════════════════════════
// STATE & API
// ════════════════════════════════════════════════════════════════════════
const BACKEND_ORIGIN = location.port === '3000' ? location.origin : `${location.protocol}//localhost:3000`;
const API = `${BACKEND_ORIGIN}/api`;
let state = {
  user: null, accessToken: null, refreshToken: null, rooms: [], currentRoomId: null,
  messages: [], hasMore: false, cursor: null, loadingMessages: false, replyTo: null,
  typingUsers: {}, ws: null, editingMessageId: null, pendingAttachments: [],
};

// --- VIEW MANAGEMENT ---
function showView(viewId) {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-view').style.display = 'none';
  document.getElementById('network-view').style.display = 'none';

  document.querySelectorAll('.rail-item').forEach(el => el.classList.remove('active'));

  if (viewId === 'network-view') {
    document.getElementById('network-view').style.display = 'flex';
    document.getElementById('nav-network-btn').classList.add('active');
    initNetworkGraph(); // Render graph when shown
  } else if (viewId === 'chat-view') {
    document.getElementById('chat-view').style.display = 'flex';
    document.getElementById('nav-messages-btn').classList.add('active');
  } else {
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('nav-messages-btn').classList.add('active');
  }
}

document.getElementById('nav-network-btn').addEventListener('click', () => showView('network-view'));
document.getElementById('nav-messages-btn').addEventListener('click', () => showView(state.currentRoomId ? 'chat-view' : 'empty-state'));
document.getElementById('seed-network-btn').addEventListener('click', async () => {
  try {
    await apiPost('/social/seed-dummy', {});
    await initNetworkGraph();
    toast('Network seeded from backend', 'success');
  } catch (err) {
    toast('Failed to seed network', 'error');
  }
});


// ════════════════════════════════════════════════════════════════════════
// NETWORK GRAPH (VIS.JS)
// ════════════════════════════════════════════════════════════════════════
let network = null;

async function initNetworkGraph() {
  const container = document.getElementById('graph-container');
  if (network !== null) {
      network.destroy();
  }

  container.innerHTML = '<div style="padding:16px;color:var(--text-soft);">Loading network...</div>';
  let graph;
  try {
    graph = await apiGet('/social/graph');
  } catch (err) {
    container.innerHTML = '<div style="padding:16px;color:#b42318;">Failed to load network</div>';
    return;
  }

  const nodesArray = [];
  const edgesArray = [];

  nodesArray.push({
    id: graph.me.id,
    label: graph.me.displayName || graph.me.username || 'Me',
    group: 'me',
    value: 20,
  });

  for (const friend of graph.friends || []) {
    nodesArray.push({
      id: friend.id,
      label: friend.displayName || friend.username || 'Friend',
      group: 'friend',
      value: Math.max(6, Math.round((friend.chatFreq || 0) / 3)),
    });
  }

  for (const fof of graph.friendsOfFriends || []) {
    nodesArray.push({
      id: fof.id,
      label: fof.displayName || fof.username || 'User',
      group: 'fof',
      value: Math.max(4, Math.round((fof.chatFreq || 0) / 5)),
    });
  }

  for (const link of graph.links || []) {
    const isFriend = link.kind === 'friend';
    edgesArray.push({
      from: link.source,
      to: link.target,
      width: isFriend ? 2 : 1,
      color: { color: isFriend ? '#98a2b3' : '#eaecf0' },
    });
  }

  const nodes = new vis.DataSet(nodesArray);
  const edges = new vis.DataSet(edgesArray);

  const data = {
    nodes: nodes,
    edges: edges
  };

  const options = {
    nodes: {
      shape: "dot",
      scaling: {
        customScalingFunction: function (min, max, total, value) {
          return value / total;
        },
        min: 10,
        max: 50
      },
      font: {
        size: 14,
        face: 'Inter',
        color: '#101828'
      }
    },
    groups: {
      me: {
        color: { background: "#1570ef", border: "#175cd3" },
        font: { color: "white" }
      },
      friend: {
        color: { background: "#12b76a", border: "#027a48" }
      },
      fof: {
        color: { background: "#f2f4f7", border: "#d0d5dd" }
      }
    },
    edges: {
      color: {
        color: '#d0d5dd',
        highlight: '#1570ef',
        hover: '#1570ef'
      },
      smooth: {
        type: 'continuous'
      }
    },
    physics: {
      stabilization: false,
      barnesHut: {
        gravitationalConstant: -2000,
        springConstant: 0.04,
        springLength: 95
      }
    },
    interaction: {
        hover: true
    }
  };

  network = new vis.Network(container, data, options);
}

// ════════════════════════════════════════════════════════════════════════
// REST OF API AND LOGIC 
// ════════════════════════════════════════════════════════════════════════

function saveAuth() {
  if (state.accessToken) {
    sessionStorage.setItem('accessToken', state.accessToken);
    sessionStorage.setItem('refreshToken', state.refreshToken || '');
    sessionStorage.setItem('user', JSON.stringify(state.user));
  } else {
    sessionStorage.clear();
  }
}

function loadAuth() {
  const at = sessionStorage.getItem('accessToken');
  const u = sessionStorage.getItem('user');
  if (at && u) {
    state.accessToken = at;
    state.refreshToken = sessionStorage.getItem('refreshToken');
    state.user = JSON.parse(u);
    return true;
  }
  return false;
}

async function apiFetch(path, options = {}) {
  const headers = { ...(options.headers || {}) };
  const isFormData = typeof FormData !== 'undefined' && options.body instanceof FormData;
  if (!isFormData && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  if (state.accessToken) headers['Authorization'] = `Bearer ${state.accessToken}`;

  let res = await fetch(API + path, { ...options, headers });
  if (res.status === 401 && state.refreshToken) {
    const refreshRes = await fetch(API + '/auth/refresh', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken: state.refreshToken }),
    });
    if (refreshRes.ok) {
      const data = await refreshRes.json();
      state.accessToken = data.accessToken;
      state.refreshToken = data.refreshToken;
      saveAuth();
      headers['Authorization'] = `Bearer ${state.accessToken}`;
      res = await fetch(API + path, { ...options, headers });
    } else {
      logout(); return null;
    }
  }
  return res;
}
async function apiGet(path) { const r = await apiFetch(path); return r && r.ok ? r.json() : Promise.reject(await r?.json().catch(()=>({}))); }
async function apiPost(path, body) { const r = await apiFetch(path, { method: 'POST', body: JSON.stringify(body) }); return r && r.ok ? r.json() : Promise.reject(await r?.json().catch(()=>({}))); }
async function apiUploadAttachment(file) {
  const form = new FormData(); form.append('file', file);
  const r = await apiFetch(`/rooms/${state.currentRoomId}/messages/attachments`, { method: 'POST', body: form, headers: {} });
  return r && r.ok ? r.json() : Promise.reject(await r?.json().catch(()=>({})));
}

function toast(msg, type = 'info') {
  const el = document.createElement('div'); el.className = `toast ${type}`; el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ════════════════════════════════════════════════════════════════════════
// AUTH & WS
// ════════════════════════════════════════════════════════════════════════
async function login(username, password) {
  try {
    const data = await apiPost('/auth/login', { username, password });
    state.user = data.user; state.accessToken = data.accessToken; state.refreshToken = data.refreshToken;
    saveAuth(); onAuthenticated();
  } catch (err) { showError(err.error || 'Login failed'); }
}
async function register(username, displayName, email, password) {
  try {
    const data = await apiPost('/auth/register', { username, displayName, email, password });
    state.user = data.user; state.accessToken = data.accessToken; state.refreshToken = data.refreshToken;
    saveAuth(); onAuthenticated();
  } catch (err) { showError(err.error || 'Registration failed'); }
}
function logout() {
  if (state.ws) state.ws.close();
  state = { ...state, user: null, accessToken: null, refreshToken: null, rooms: [], currentRoomId: null, messages: [] };
  saveAuth(); document.getElementById('auth-modal').style.display = 'flex';
}

function connectWS() {
  if (state.ws && state.ws.readyState < 2) return;
  const wsHost = BACKEND_ORIGIN.replace(/^http/, 'ws');
  state.ws = new WebSocket(`${wsHost}/ws?token=${state.accessToken}`);
  state.ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'message:new') {
        if (msg.payload.roomId === state.currentRoomId) {
          addMessageToView(msg.payload, true);
          scrollToBottom();
        } else {
          const room = state.rooms.find((r) => r.id === msg.payload.roomId);
          if (room) {
            room.unreadCount = Number(room.unreadCount || 0) + 1;
            renderSidebar();
          }
        }
      }
      if (msg.type === 'presence') updatePresence(msg.payload.userId, msg.payload.isOnline);
    } catch {}
  };
  state.ws.onclose = () => { if (state.accessToken) setTimeout(connectWS, 3000); };
}

function updatePresence(userId, isOnline) {
  state.rooms.forEach(room => {
    const member = room.members?.find(m => m.user.id === userId);
    if (member) member.user.isOnline = isOnline;
  });
  if (state.currentRoomId) {
    const currentRoom = state.rooms.find(r => r.id === state.currentRoomId);
    if (currentRoom && currentRoom.type === 'direct') {
      const other = currentRoom.members?.find(m => m.user.id !== state.user.id)?.user;
      if (other && other.id === userId) {
        document.getElementById('chat-header-status').style.display = isOnline ? 'flex' : 'none';
      }
    }
  }
  renderActiveUsers();
}

// ════════════════════════════════════════════════════════════════════════
// ROOMS RENDERING
// ════════════════════════════════════════════════════════════════════════
async function loadRooms() {
  try {
    const data = await apiGet('/rooms');
    state.rooms = data.rooms;
    renderSidebar();
    renderActiveUsers();
  } catch (err) { toast(err.error || 'Failed to load rooms', 'error'); }
}

function renderSidebar() {
  const dms = state.rooms.filter(r => r.type === 'direct');
  const groups = state.rooms.filter(r => r.type !== 'direct');
  document.getElementById('dm-list').innerHTML = dms.map(r => renderRoomItem(r)).join('');
  document.getElementById('room-list').innerHTML = groups.map(r => renderRoomItem(r)).join('');
  renderNotificationBadge();
}

function renderNotificationBadge() {
  const badge = document.getElementById('nav-notifications-badge');
  if (!badge) return;
  const totalUnread = state.rooms.reduce((sum, room) => sum + Number(room.unreadCount || 0), 0);
  badge.textContent = String(totalUnread);
  badge.style.display = totalUnread > 0 ? 'inline-block' : 'none';
}

function renderActiveUsers() {
  const holder = document.getElementById('active-users-list');
  if (!holder) return;

  const unique = new Map();
  for (const room of state.rooms) {
    for (const member of (room.members || [])) {
      const user = member.user;
      if (!user || user.id === state.user?.id) continue;
      if (!user.isOnline) continue;
      if (!unique.has(user.id)) unique.set(user.id, user);
    }
  }

  const activeUsers = [...unique.values()].slice(0, 12);
  if (!activeUsers.length) {
    holder.innerHTML = '<div style="font-size:12px;color:var(--text-soft);padding:4px 0;">No one online</div>';
    return;
  }

  holder.innerHTML = activeUsers.map((u) => {
    const initials = (u.displayName || u.username || '?').slice(0, 2).toUpperCase();
    const avatar = u.avatarUrl
      ? `<img src="${esc(u.avatarUrl)}" alt="${esc(u.displayName || u.username || 'user')}">`
      : `<span>${esc(initials)}</span>`;
    return `<div class="active-dot" title="${esc(u.displayName || u.username || 'User')}">${avatar}<div class="status-indicator"></div></div>`;
  }).join('');
}

function getRoomName(room) {
  if (room.type === 'direct') {
    const other = room.members?.find(m => m.user.id !== state.user?.id);
    return other ? other.user.displayName : 'Unknown';
  }
  return room.name || 'Group Room';
}

function renderRoomItem(room) {
  const name = getRoomName(room);
  const active = room.id === state.currentRoomId ? 'active' : '';
  let avatarHtml = `<span>${name.slice(0, 2).toUpperCase()}</span>`;
  let subtitle = room.description || '';
  
  if (room.type === 'direct') {
    const other = room.members?.find(m => m.user.id !== state.user?.id)?.user;
    if (other?.avatarUrl) avatarHtml = `<img src="${esc(other.avatarUrl)}" alt="">`;
    subtitle = `@${other?.username || 'direct'}`;
  }

  const timeStr = "20min ago"; 

  return `
    <div class="room-item ${active}" onclick="selectRoom('${room.id}')">
      <div class="room-avatar">${avatarHtml}</div>
      <div class="room-content">
        <div class="room-top">
          <div class="room-name">${esc(name)}</div>
          <div class="room-time">${timeStr}</div>
        </div>
        <div class="room-preview">${esc(subtitle)}</div>
      </div>
    </div>`;
}

async function selectRoom(roomId) {
  state.currentRoomId = roomId;
  state.messages = [];
  const selectedRoom = state.rooms.find((r) => r.id === roomId);
  if (selectedRoom) selectedRoom.unreadCount = 0;
  renderSidebar(); 

  const room = state.rooms.find(r => r.id === roomId);
  if (!room) return;

  showView('chat-view');

  const name = getRoomName(room);
  document.getElementById('chat-header-name').textContent = name;
  
  const avatarEl = document.getElementById('chat-header-avatar');
  const handleEl = document.getElementById('chat-header-handle');
  const statusEl = document.getElementById('chat-header-status');

  if (room.type === 'direct') {
    const other = room.members?.find(m => m.user.id !== state.user?.id)?.user;
    avatarEl.innerHTML = other?.avatarUrl ? `<img src="${esc(other.avatarUrl)}" alt="">` : `<span>${name.slice(0,2).toUpperCase()}</span>`;
    handleEl.textContent = `@${other?.username || ''}`;
    statusEl.style.display = other?.isOnline ? 'flex' : 'none';
  } else {
    avatarEl.innerHTML = `<span>#</span>`;
    handleEl.textContent = `${room.members?.length || 0} members`;
    statusEl.style.display = 'none';
  }

  document.getElementById('messages-container').innerHTML = '';
  await loadMessages();
  scrollToBottom(true);
}

// ════════════════════════════════════════════════════════════════════════
// MESSAGES RENDERING
// ════════════════════════════════════════════════════════════════════════
async function loadMessages() {
  if (!state.currentRoomId) return;
  try {
    const data = await apiGet(`/rooms/${state.currentRoomId}/messages?limit=50`);
    state.messages = data.messages.reverse(); 
    renderMessages();
  } catch (err) { toast('Failed to load messages', 'error'); }
}

function isCompactMessage(prevMsg, msg) {
  if (!prevMsg || !msg) return false;
  if (prevMsg.sender?.id !== msg.sender?.id) return false;
  const diff = new Date(msg.createdAt).getTime() - new Date(prevMsg.createdAt).getTime();
  return diff < 5 * 60 * 1000;
}

function renderMessages() {
  const container = document.getElementById('messages-container');
  container.innerHTML = '';
  let prevMsg = null;
  let lastDate = null;

  for (const msg of state.messages) {
    const dStr = new Date(msg.createdAt).toDateString();
    if (dStr !== lastDate) {
      const div = document.createElement('div'); div.className = 'date-divider';
      div.textContent = dStr === new Date().toDateString() ? 'Today' : new Date(msg.createdAt).toLocaleDateString('en-US', {weekday:'long'});
      container.appendChild(div);
      lastDate = dStr;
      prevMsg = null;
    }
    const el = createMessageEl(msg, prevMsg);
    container.appendChild(el);
    prevMsg = msg;
  }
}

function createMessageEl(msg, prevMsg = null) {
  const group = document.createElement('div');
  const isMe = msg.sender?.id === state.user?.id;
  group.className = `message-group ${isMe ? 'mine' : ''}`;
  if (isCompactMessage(prevMsg, msg)) group.classList.add('compact');

  const senderName = isMe ? 'You' : (msg.sender?.displayName || 'Unknown');
  const timeStr = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  // Avatar block
  let avatarHtml = '';
  if (!isMe) {
    const initials = senderName.slice(0,2).toUpperCase();
    const imgStr = msg.sender?.avatarUrl ? `<img src="${esc(msg.sender.avatarUrl)}">` : `<span>${initials}</span>`;
    avatarHtml = `<div class="msg-avatar">${imgStr}</div>`;
  }

  // Attachments
  let attachmentsHtml = '';
  if (msg.attachments && msg.attachments.length > 0) {
    attachmentsHtml = `<div class="msg-attachments">` + msg.attachments.map(att => {
      const rawName = att.filename || att.fileName || att.originalFilename || att.name || 'Attachment';
      const rawUrl = att.url || att.publicUrl || att.public_url || att.fileUrl || att.file_url
        || (att.storagePath || att.storage_path ? `${location.origin}/${String(att.storagePath || att.storage_path).replace(/^\/+/, '')}` : '');
      const rawMime = att.mimeType || att.mime_type || '';
      const rawType = att.attachmentType || att.attachment_type || '';
      const name = esc(rawName);
      const url = esc(rawUrl || '#');
      const isImg = String(rawType) === 'image' || String(rawMime).startsWith('image/');
      if (isImg && rawUrl) {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer"><img class="msg-attachment-image" src="${url}" alt="${name}"></a>`;
      }
      if (!rawUrl) {
        return `
        <div class="file-card">
          <div class="file-icon">📄</div>
          <div class="file-info">
            <div class="file-name">${name}</div>
            <div class="file-meta">File unavailable</div>
          </div>
        </div>`;
      }
      return `
        <a href="${url}" target="_blank" rel="noopener noreferrer" class="file-card">
          <div class="file-icon">📄</div>
          <div class="file-info">
            <div class="file-name">${name}</div>
            <div class="file-meta">${esc(rawType || 'Document')}</div>
          </div>
        </a>`;
    }).join('') + `</div>`;
  }

  const contentStr = esc(msg.content).replace(/\n/g, '<br>');

  group.innerHTML = `
    ${avatarHtml}
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-author">${esc(senderName)}</span>
        <span class="msg-time">${timeStr}</span>
      </div>
      ${contentStr ? `<div class="msg-content">${contentStr}</div>` : ''}
      ${attachmentsHtml}
    </div>
    <div class="msg-actions">
      <button class="msg-action-btn">☺</button>
      <button class="msg-action-btn">↩</button>
    </div>
  `;
  return group;
}

function addMessageToView(msg, isNew = false) {
  const container = document.getElementById('messages-container');
  const prev = state.messages[state.messages.length - 1];
  container.appendChild(createMessageEl(msg, prev));
  state.messages.push(msg);
}

// ════════════════════════════════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if ((!content && state.pendingAttachments.length === 0) || !state.currentRoomId) return;

  const payload = { content, attachmentIds: state.pendingAttachments.map(a => a.id) };
  input.value = '';
  state.pendingAttachments = [];
  document.getElementById('pending-attachments').style.display = 'none';

  try {
    const res = await apiPost(`/rooms/${state.currentRoomId}/messages`, payload);
    if (state.ws?.readyState !== WebSocket.OPEN && res?.message) {
      addMessageToView(res.message, true);
      scrollToBottom();
    }
  } catch (err) { toast('Failed to send message', 'error'); }
}

function scrollToBottom(instant = false) {
  const c = document.getElementById('messages-container');
  c.scrollTo({ top: c.scrollHeight, behavior: instant ? 'auto' : 'smooth' });
}

function esc(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ════════════════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ════════════════════════════════════════════════════════════════════════
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('attach-btn').addEventListener('click', () => {
  if(state.currentRoomId) document.getElementById('attachment-input').click();
});

document.getElementById('attachment-input').addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  if (file) {
    try {
      const data = await apiUploadAttachment(file);
      if (data?.attachment) {
        state.pendingAttachments.push(data.attachment);
        const holder = document.getElementById('pending-attachments');
        holder.style.display = 'flex';
        holder.innerHTML += `<div style="background:#f2f4f7; padding:4px 8px; border-radius:4px; font-size:12px;">${esc(data.attachment.filename)}</div>`;
      }
    } catch (err) { toast('Upload failed', 'error'); }
  }
  e.target.value = '';
});

// Modals
document.querySelectorAll('.form-tab').forEach(t => t.addEventListener('click', (e) => {
  document.querySelectorAll('.form-tab').forEach(btn => btn.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('login-form').style.display = e.target.dataset.tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = e.target.dataset.tab === 'register' ? 'block' : 'none';
}));

document.getElementById('login-btn').addEventListener('click', () => {
  login(document.getElementById('login-username').value, document.getElementById('login-password').value);
});
document.getElementById('register-btn').addEventListener('click', () => {
  register(document.getElementById('reg-username').value, document.getElementById('reg-displayname').value, document.getElementById('reg-email').value, document.getElementById('reg-password').value);
});

function showError(msg) { const el = document.getElementById('auth-error'); el.textContent = msg; el.style.display = 'block'; }
async function onAuthenticated() {
  document.getElementById('auth-modal').style.display = 'none';
  await loadRooms();
  connectWS();
}
document.getElementById('logout-btn').addEventListener('click', logout);
document.getElementById('nav-notifications-btn').addEventListener('click', () => {
  showView(state.currentRoomId ? 'chat-view' : 'empty-state');
});

// New DM flow
document.getElementById('new-dm-btn').addEventListener('click', () => {
  document.getElementById('new-dm-modal').style.display = 'flex';
});
document.getElementById('cancel-new-dm').addEventListener('click', () => {
  document.getElementById('new-dm-modal').style.display = 'none';
});
document.getElementById('dm-search-input').addEventListener('input', async (e) => {
  const q = e.target.value.trim();
  const resEl = document.getElementById('dm-search-results');
  if (q.length < 2) { resEl.style.display = 'none'; return; }
  try {
    const data = await apiGet(`/rooms/users/search?q=${encodeURIComponent(q)}`);
    resEl.innerHTML = data.users.map(u => `
      <div style="padding:12px; border-bottom:1px solid #eaecf0; cursor:pointer;" onclick="startDM('${u.id}')">
        <div style="font-weight:500;">${esc(u.displayName)}</div>
        <div style="font-size:12px; color:#667085;">@${esc(u.username)}</div>
      </div>
    `).join('');
    resEl.style.display = 'block';
  } catch(e){}
});
async function startDM(userId) {
  document.getElementById('new-dm-modal').style.display = 'none';
  try {
    const data = await apiPost(`/rooms/dm/${userId}`, {});
    await loadRooms();
    selectRoom(data.room.id);
  } catch (err) { toast('Failed to start chat', 'error'); }
}

async function init() {
  if (loadAuth()) { onAuthenticated(); } else { document.getElementById('auth-modal').style.display = 'flex'; }
}
init();
</script>
</body>
